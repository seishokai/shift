<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>清翔会 シフト</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f5f3;color:#1a1a18;font-size:13px;}
/* ヘッダー */
.hdr{background:#fff;border-bottom:1px solid #ddd;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.hdr h1{font-size:15px;font-weight:800;white-space:nowrap;}
.hdr-tabs{display:flex;gap:2px;}
.tab-btn{padding:6px 14px;border:none;background:#f0f0ee;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:#666;}
.tab-btn.on{background:#1a1a18;color:#fff;}
.month-nav{display:flex;align-items:center;gap:4px;margin-left:auto;}
.month-nav button{width:32px;height:30px;border:1px solid #ddd;background:#fff;border-radius:8px;font-size:16px;cursor:pointer;}
.month-nav span{font-size:14px;font-weight:700;min-width:110px;text-align:center;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.save-btn{padding:6px 16px;border:none;background:#2e7d32;color:#fff;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
.save-btn:hover{background:#1b5e20;}
.login-btn{padding:5px 12px;border:1px solid #ddd;background:#fff;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer;}
.undo-btn{padding:5px 10px;border:1px solid #ddd;background:#fff;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer;}
/* ステータスバー */
#sb{display:none;position:fixed;top:50px;right:12px;z-index:200;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);}
/* テーブル共通 */
.grid-wrap{overflow:auto;height:calc(100vh - 52px);}
table.grid{border-collapse:collapse;white-space:nowrap;}
table.grid th,table.grid td{border:1px solid #d0d0cc;padding:0;text-align:center;font-size:10px;}
table.grid th{background:#edebe6;font-weight:600;position:sticky;top:0;z-index:10;padding:4px 2px;}
.fix-left{position:sticky;left:0;z-index:11;background:#edebe6;}
.fix-left-body{position:sticky;left:0;z-index:5;background:#fff;}
/* シフトセル */
.shift-cell{width:32px;min-width:32px;height:24px;cursor:pointer;user-select:none;transition:opacity .1s;}
.shift-cell:hover{opacity:.8;}
/* 日付ヘッダー */
.date-hdr{writing-mode:horizontal-tb;min-width:32px;padding:2px 1px !important;font-size:9px;}
.sun{color:#e05252;background:#fff5f5 !important;}.sat{color:#4a7fd4;background:#f0f5ff !important;}
.hol-badge{background:#e05252;color:#fff;font-size:7px;border-radius:3px;padding:0 3px;margin-left:1px;}
/* ペイントバー */
#paintBar{display:none;position:sticky;top:0;z-index:50;background:#fff;color:#333;padding:6px 10px;font-size:12px;border-bottom:2px solid #ddd;box-shadow:0 2px 6px rgba(0,0,0,.08);}
#paintBar .paint-opt{padding:4px 10px;border-radius:10px;border:2px solid transparent;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;margin:0 2px;}
/* 休診日セル */
.closed-cell{width:50px;min-width:50px;height:26px;cursor:pointer;user-select:none;font-weight:700;font-size:10px;}
.closed-cell:hover{opacity:.8;}
/* 集計 */
.sum-tbl{border-collapse:collapse;width:100%;}
.sum-tbl th,.sum-tbl td{border:1px solid #d0d0cc;padding:4px 6px;text-align:center;font-size:11px;}
.sum-tbl th{background:#edebe6;font-weight:600;}
/* 色 */
.cc-esca{--cc:#c0392b;--cb:#fdf0ee;}.cc-r{--cc:#7030a0;--cb:#f5eef8;}
.cc-wiz{--cc:#1e8449;--cb:#e9f7ef;}.cc-luminas{--cc:#27ae60;--cb:#e8f5e9;}
.cc-chaya{--cc:#d4a017;--cb:#fef9e7;}.cc-asano{--cc:#85200c;--cb:#fdf3ea;}
.cc-chiryu{--cc:#0a6b8a;--cb:#e0f2f8;}.cc-komaki{--cc:#d81b60;--cb:#fce4ec;}
.cc-yagoto{--cc:#8b4513;--cb:#f9ece2;}.cc-omori{--cc:#1f6b4e;--cb:#e4f4ed;}
.cc-kyoto{--cc:#6b3a87;--cb:#f2ecf8;}.cc-ginza{--cc:#7d6608;--cb:#f8f3e2;}
.cc-houmon1{--cc:#2c6e8a;--cb:#e6eef5;}.cc-houmon2{--cc:#4a9bb5;--cb:#e8f2f6;}.cc-toin{--cc:#b85c00;--cb:#fff3e0;}
.cc-yasumi{--cc:#999;--cb:#f2f2f0;}.cc-yukyu{--cc:#c0392b;--cb:#f0f0ee;}
.cc-daikyu{--cc:#1a5276;--cb:#e8f4fd;}.cc-daishutsu{--cc:#555;--cb:#f0f0ee;}
.cc-kyushutsu{--cc:#e67e22;--cb:#fef5e7;}
/* 医院別ビュー */
.clinic-card{background:#fff;border-radius:12px;padding:10px;margin-bottom:8px;border:1px solid #ddd;}
.clinic-card h4{font-size:13px;margin-bottom:6px;}
.doc-chip{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;margin:2px;}
/* 個人ビュー */
.person-sel{padding:8px 16px;border-radius:16px;border:1.5px solid #ddd;background:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin:2px;}
.person-sel.on{background:#1a1a18;color:#fff;border-color:#1a1a18;}
.pcal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.pcal-cell{border-radius:8px;min-height:90px;padding:6px;background:#fff;border:1px solid #eee;font-size:12px;}
.pcal-cell.sun{background:#fff5f5;}.pcal-cell.sat{background:#f0f5ff;}
/* シフト希望 */
.req-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.req-cell{border-radius:8px;min-height:50px;padding:6px 4px;background:#fff;border:2px solid #eee;cursor:pointer;text-align:center;font-size:11px;font-weight:600;}
.req-cell.sel{border-color:#7b2d8b;background:#f3e5f5;}
.req-type{padding:8px 14px;border-radius:12px;border:2px solid #ddd;background:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;margin:3px;}
.req-type.on{border-color:#7b2d8b;background:#7b2d8b;color:#fff;}
/* モバイル対応 */
@media(max-width:768px){
  .hdr{padding:4px 8px;gap:4px;}
  .hdr h1{font-size:13px;}
  .hdr-tabs{gap:1px;}
  .tab-btn{padding:4px 8px;font-size:10px;}
  .month-nav span{font-size:12px;min-width:80px;}
  .hdr-right{gap:3px;}
  .undo-btn,.login-btn{padding:4px 8px;font-size:10px;}
  .save-btn{padding:4px 10px;font-size:10px;}
  .grid-wrap{height:calc(100vh - 44px);-webkit-overflow-scrolling:touch;}
  .shift-cell{width:26px;min-width:26px;height:22px;font-size:7px!important;line-height:22px!important;}
  .date-hdr{min-width:26px!important;font-size:8px!important;}
  #paintBar{flex-wrap:wrap;gap:4px;}
  #paintBar .paint-opt{padding:3px 7px;font-size:9px;margin:1px;}
  .pcal-cell{min-height:64px;font-size:10px;}
  .person-sel{padding:5px 10px;font-size:11px;}
  .doc-chip{font-size:10px;padding:2px 6px;}
  .req-cell{min-height:44px;font-size:10px;}
}
@media print{.hdr,#paintBar,#sb{display:none!important;}.grid-wrap{height:auto;overflow:visible;}}
</style>
</head>

];

/* 休診ルール */
var CLOSED_WEEKDAY={komaki:[2],chiryu:[3],kyoto:[4],omori:[4],chaya:[4],toin:[0]};
var HOL_CLOSED=['esca','r','wiz','omori','toin'];
var SUN_A=['esca','r'];
var SUN_B=['wiz','luminas','omori'];
var HOL=new Set(['2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20',
  '2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23','2026-12-23']);

var EXCEL_DATA={};

/* ======= 状態管理 ======= */
var shifts={};
var CLOSED_DATES={};
var curY=2026,curM=5,curTab=0,isAdmin=false;
var paintClinic=null;
var undoStack=[],redoStack=[];
var today=new Date();
var HOUMON_DAYS={}; /* {'2026-06':['2026-06-01','2026-06-03',...]} */

/* ======= ユーティリティ ======= */
function cc(id){var el=document.createElement('div');el.className='cc-'+id;document.body.appendChild(el);var s=getComputedStyle(el);var c=s.getPropertyValue('--cc').trim()||'#999';var b=s.getPropertyValue('--cb').trim()||'#f0f0f0';document.body.removeChild(el);return{c:c,b:b};}
var _ccCache={};
function getCC(id){if(!_ccCache[id])_ccCache[id]=cc(id);return _ccCache[id];}
function cname(id){if(!id)return'';var p=ALL.find(function(x){return x.id===id;});return p?p.n:id;}
function shiftLabel(sh){if(!sh)return'';if(sh.clinicId==='yasumi'&&sh.memo==='希望')return'希望休';return cname(sh.clinicId);}
function ds(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function showSb(msg,type){
  var el=document.getElementById('sb');
  if(!msg){el.style.display='none';return;}
  el.style.display='block';el.textContent=msg;
  el.style.background=type==='ok'?'#2e7d32':type==='e'?'#b83030':'#555';
  if(type==='ok')setTimeout(function(){el.style.display='none';},2500);
}

/* ======= 休診日判定 ======= */
function isClosed(dateStr,cid){
  var d=new Date(dateStr),w=d.getDay();
  if(cid&&CLOSED_DATES[cid+'_open']&&CLOSED_DATES[cid+'_open'].indexOf(dateStr)>=0)return false;
  if(cid&&CLOSED_DATES[cid]&&CLOSED_DATES[cid].indexOf(dateStr)>=0)return true;
  if(cid&&CLOSED_WEEKDAY[cid]&&CLOSED_WEEKDAY[cid].indexOf(w)>=0)return true;
  if(w===0&&cid){
    var inA=SUN_A.indexOf(cid)>=0,inB=SUN_B.indexOf(cid)>=0;
    if(inA||inB){
      var ref=Date.UTC(2026,5,7),cur=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate());
      var wk=Math.round((cur-ref)/(7*864e5));
      if(((wk%2)+2)%2===0&&inA)return true;
      if(((wk%2)+2)%2!==0&&inB)return true;
    }
  }
  if(HOL.has(dateStr)&&cid&&HOL_CLOSED.indexOf(cid)>=0)return true;
  return false;
}

/* ======= データ永続化（防弾仕様） ======= */
function countEntries(obj){var n=0;Object.keys(obj).forEach(function(k){if(Array.isArray(obj[k]))n+=obj[k].length;});return n;}

function saveShifts(){
  try{
    var cnt=countEntries(shifts);
    if(cnt===0){
      var old=localStorage.getItem('seishokai_shifts_v2');
      if(old&&countEntries(JSON.parse(old))>5){console.warn('BLOCKED: empty save');return;}
    }
    var j=JSON.stringify(shifts);
    localStorage.setItem('seishokai_shifts_v2',j);
    localStorage.setItem('seishokai_shifts_v2_bak',j);
    localStorage.setItem('seishokai_shifts_v2_ts',new Date().toISOString());
  }catch(e){}
}
function saveClosed(){
  try{var j=JSON.stringify(CLOSED_DATES);localStorage.setItem('seishokai_closed_v2',j);localStorage.setItem('seishokai_closed_v2_bak',j);}catch(e){}
  try{localStorage.setItem('seishokai_houmon_v2',JSON.stringify(HOUMON_DAYS));}catch(e){}
}
function loadData(){
  showSb('読み込み中...');
  /* 1. localStorage */
  var ls;
  try{ls=localStorage.getItem('seishokai_shifts_v2');}catch(e){}
  if(!ls){try{ls=localStorage.getItem('seishokai_shifts_v2_bak');}catch(e){}}
  if(ls){
    try{
      var p=JSON.parse(ls);
      if(countEntries(p)>0){
        shifts=p;
        var ts=localStorage.getItem('seishokai_shifts_v2_ts')||'';
        showSb(countEntries(shifts)+'件読込','ok');
        loadClosed();
        return Promise.resolve();
      }
    }catch(e){}
  }
  /* 2. Supabase + EXCEL_DATA */
  return fetch(SB_URL+'/rest/v1/shifts?select=*&limit=10000',{headers:Object.assign({},SB_H)})
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
  .then(function(rows){
    shifts={};Object.assign(shifts,EXCEL_DATA);
    if(rows&&rows.length){
      rows.forEach(function(row){
        if(!shifts[row.date_str])shifts[row.date_str]=[];
        var idx=shifts[row.date_str].findIndex(function(s){return s.docId===row.doc_id;});
        var e={docId:row.doc_id,clinicId:row.clinic_id,memo:row.memo||''};
        if(idx>=0)shifts[row.date_str][idx]=e;else shifts[row.date_str].push(e);
      });
    }
    saveShifts();
    showSb(countEntries(shifts)+'件読込','ok');
  }).catch(function(){
    shifts={};Object.assign(shifts,EXCEL_DATA);
    showSb('初期データ使用','e');
  }).then(function(){loadClosed();});
}
function loadClosed(){
  try{
    var s=localStorage.getItem('seishokai_closed_v2');
    if(!s)s=localStorage.getItem('seishokai_closed_v2_bak');
    if(s){var d=JSON.parse(s);Object.keys(d).forEach(function(k){CLOSED_DATES[k]=d[k];});}
  }catch(e){}
  try{var h=localStorage.getItem('seishokai_houmon_v2');if(h)HOUMON_DAYS=JSON.parse(h);}catch(e){}
}

/* Supabase保存（個別） */
function dbSave(dateStr,docId,cid,memo){
  saveShifts();
  var h={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'return=minimal'};
  fetch(SB_URL+'/rest/v1/shifts',{method:'POST',headers:h,
    body:JSON.stringify({date_str:dateStr,doc_id:docId,clinic_id:cid,memo:memo||''})
  }).then(function(r){
    if(r.status===409){
      return fetch(SB_URL+'/rest/v1/shifts?date_str=eq.'+dateStr+'&doc_id=eq.'+docId,{
        method:'PATCH',headers:h,body:JSON.stringify({clinic_id:cid,memo:memo||''})
      });
    }
    return r;
  }).then(function(r){
    if(r.ok||r.status===201||r.status===204)showSb('✓','ok');
    else showSb('保存失敗','e');
  }).catch(function(){showSb('通信エラー','e');});
}
function dbDel(dateStr,docId){
  saveShifts();
  var h={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY};
  fetch(SB_URL+'/rest/v1/shifts?date_str=eq.'+dateStr+'&doc_id=eq.'+docId,{method:'DELETE',headers:h}).catch(function(){});
}
function saveAll(){saveShifts();saveClosed();showSb('保存完了','ok');}

/* ======= Undo/Redo ======= */
function snapshot(){
  var snap={s:JSON.stringify(shifts),c:JSON.stringify(CLOSED_DATES)};
  undoStack.push(snap);if(undoStack.length>30)undoStack.shift();
  redoStack=[];
}
function undo(){
  if(!undoStack.length)return;
  redoStack.push({s:JSON.stringify(shifts),c:JSON.stringify(CLOSED_DATES)});
  var snap=undoStack.pop();
  shifts=JSON.parse(snap.s);CLOSED_DATES=JSON.parse(snap.c);
  saveShifts();saveClosed();renderTab();
}
function redo(){
  if(!redoStack.length)return;
  undoStack.push({s:JSON.stringify(shifts),c:JSON.stringify(CLOSED_DATES)});
  var snap=redoStack.pop();
  shifts=JSON.parse(snap.s);CLOSED_DATES=JSON.parse(snap.c);
  saveShifts();saveClosed();renderTab();
}

function cellClick(dateStr,docId){
  if(!isAdmin)return;
  if(paintClinic){
    var cid=paintClinic==='__kibokyu__'?'yasumi':paintClinic;
    /* 休診日チェック：休み系以外は休診日に登録不可 */
    var restIds2=['yasumi','yukyu','daikyu','daishutsu','kyushutsu'];
    if(restIds2.indexOf(cid)<0&&paintClinic!=='__del__'&&isClosed(dateStr,cid)){
      showSb(cname(cid)+'は休診日です','e');return;
    }
    snapshot();
    if(!shifts[dateStr])shifts[dateStr]=[];
    var idx=shifts[dateStr].findIndex(function(s){return s.docId===docId;});
    /* 同じ医院なら削除（トグル） */
    var memo=paintClinic==='__kibokyu__'?'希望':'';
    if(idx>=0&&shifts[dateStr][idx].clinicId===cid){
      shifts[dateStr].splice(idx,1);
      if(!shifts[dateStr].length)delete shifts[dateStr];
      dbDel(dateStr,docId);
    } else {
      var entry={docId:docId,clinicId:cid,memo:memo};
      if(idx>=0)shifts[dateStr][idx]=entry;else shifts[dateStr].push(entry);
      dbSave(dateStr,docId,cid,memo);
    }
    renderShifts();
    return;
  }
  /* ペイント未選択: 既存シフトがあれば削除、なければペイントバー表示 */
  var existing=(shifts[dateStr]||[]).find(function(s){return s.docId===docId;});
  if(existing){
    snapshot();
    shifts[dateStr]=shifts[dateStr].filter(function(s){return s.docId!==docId;});
    if(!shifts[dateStr].length)delete shifts[dateStr];
    dbDel(dateStr,docId);
    renderShifts();
    return;
  }
  document.getElementById('paintBar').style.display='flex';
  renderPaintBar();
}

function doBulk(mode){
  if(!bulkDocId||!bulkClinic)return;
  snapshot();
  var days=dim(curY,curM);
  var cid=bulkClinic==='__kibokyu__'?'yasumi':bulkClinic;
  var memo=bulkClinic==='__kibokyu__'?'希望':'';
  var cnt=0,keepIds=['yasumi','yukyu','daikyu'];
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    var w=new Date(curY,curM,d).getDay();
    if(mode==='weekday'&&(w===0||w===6))continue;
    if(mode==='weekend'&&w!==0&&w!==6)continue;
    if(typeof mode==='number'&&w!==mode)continue;
    if(!shifts[dateStr])shifts[dateStr]=[];
    var existing=shifts[dateStr].find(function(s){return s.docId===bulkDocId;});
    if(existing&&keepIds.indexOf(existing.clinicId)>=0)continue;
    /* 休診日スキップ（休み系以外） */
    var restSkip=['yasumi','yukyu','daikyu','daishutsu','kyushutsu'];
    if(restSkip.indexOf(cid)<0&&isClosed(dateStr,cid))continue;
    var idx=shifts[dateStr].findIndex(function(s){return s.docId===bulkDocId;});
    var entry={docId:bulkDocId,clinicId:cid,memo:memo};
    if(idx>=0)shifts[dateStr][idx]=entry;else shifts[dateStr].push(entry);
    dbSave(dateStr,bulkDocId,cid,memo);cnt++;
  }
  saveShifts();renderShifts();
  showSb(cnt+'日を一括入力','ok');
}
function doBulkClear(){
  if(!bulkDocId)return;
  snapshot();
  var days=dim(curY,curM);
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    if(shifts[dateStr]){
      shifts[dateStr]=shifts[dateStr].filter(function(s){return s.docId!==bulkDocId;});
      if(!shifts[dateStr].length)delete shifts[dateStr];
    }
    dbDel(dateStr,bulkDocId);
  }
  saveShifts();renderShifts();
  showSb('月クリア完了','ok');
}

/* 休診日エラー一括修正 */
function fixClosedConflicts(){
  snapshot();
  var days=dim(curY,curM),cnt=0;
  var restIds3=['yasumi','yukyu','daikyu','daishutsu','kyushutsu'];
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    if(!shifts[dateStr])continue;
    shifts[dateStr]=shifts[dateStr].filter(function(s){
      if(restIds3.indexOf(s.clinicId)>=0)return true;
      if(isClosed(dateStr,s.clinicId)){cnt++;dbDel(dateStr,s.docId);return false;}
      return true;
    });
    if(!shifts[dateStr].length)delete shifts[dateStr];
  }
  saveShifts();renderShifts();
  showSb(cnt+'件の休診日エラーを修正','ok');
}

function toggleClosed(dateStr,cid){
  snapshot();
  if(!CLOSED_DATES[cid])CLOSED_DATES[cid]=[];
  var idx=CLOSED_DATES[cid].indexOf(dateStr);
  if(idx>=0){CLOSED_DATES[cid].splice(idx,1);}
  else if(isClosed(dateStr,cid)){
    if(!CLOSED_DATES[cid+'_open'])CLOSED_DATES[cid+'_open']=[];
    var oi=CLOSED_DATES[cid+'_open'].indexOf(dateStr);
    if(oi>=0)CLOSED_DATES[cid+'_open'].splice(oi,1);
    else CLOSED_DATES[cid+'_open'].push(dateStr);
  } else {CLOSED_DATES[cid].push(dateStr);}
  saveClosed();renderClosed();
}

function renderSummary(){
  var days=dim(curY,curM);
  var restIds=new Set(['yasumi','yukyu','daikyu']);
  /* ドクター別出勤数 */
  var h='<h3 style="font-size:14px;font-weight:700;margin-bottom:8px;">ドクター別出勤日数（'+(curM+1)+'月）</h3>';
  h+='<table class="sum-tbl"><thead><tr><th>ドクター</th><th>出勤</th><th>休み</th><th>有給</th><th>希望休</th></tr></thead><tbody>';
  doctors.forEach(function(doc){
    var work=0,off=0,yuk=0,kibo=0;
    for(var d=1;d<=days;d++){
      var dateStr=ds(curY,curM,d);
      var sh=(shifts[dateStr]||[]).find(function(s){return s.docId===doc.id;});
      if(sh){
        if(sh.clinicId==='yukyu')yuk++;
        else if(sh.clinicId==='yasumi'&&sh.memo==='希望')kibo++;
        else if(restIds.has(sh.clinicId))off++;
        else work++;
      }
    }
    h+='<tr><td style="font-weight:700;">'+doc.n+'</td><td style="font-weight:700;color:#2e7d32;">'+work+'</td><td>'+off+'</td><td style="color:#e53935;">'+yuk+'</td><td style="color:#7b2d8b;">'+kibo+'</td></tr>';
  });
  h+='</tbody></table>';
  /* 医院別人数 */
  h+='<h3 style="font-size:14px;font-weight:700;margin:20px 0 8px;">医院別配置人数（'+(curM+1)+'月）</h3>';
  h+='<table class="sum-tbl"><thead><tr><th>日付</th>';
  CLINICS.forEach(function(c){var col=getCC(c.id);h+='<th style="color:'+col.c+';">'+c.n+'</th>';});
  h+='</tr></thead><tbody>';
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    var w=new Date(curY,curM,d).getDay();
    var DOW=['日','月','火','水','木','金','土'];
    var isH=HOL.has(dateStr);
    var numCol=w===0||isH?'#e05252':w===6?'#4a7fd4':'';
    h+='<tr><td style="font-weight:700;color:'+numCol+';">'+d+'('+DOW[w]+')'+(isH?' <span class="hol-badge">祝</span>':'')+'</td>';
    CLINICS.forEach(function(c){
      var cnt=(shifts[dateStr]||[]).filter(function(s){return s.clinicId===c.id;}).length;
      var closed=isClosed(dateStr,c.id);
      var bg=closed?'#f0f0ee':cnt>0?getCC(c.id).b:'';
      h+='<td style="background:'+bg+';font-weight:'+(cnt?'700':'400')+';color:'+(closed?'#bbb':cnt?getCC(c.id).c:'#ccc')+';">'+(closed?'休':cnt||'')+'</td>';
    });
    h+='</tr>';
  }
  h+='</tbody></table>';
  document.getElementById('summaryView').innerHTML=h;
}

/* ======= Tab 1: 医院別ビュー ======= */
var selClinic=null;
function renderClinicView(){
  var bar=document.getElementById('clinicSelBar');
  bar.innerHTML=CLINICS.map(function(c){
    var col=getCC(c.id),on=selClinic===c.id;
    return '<button onclick="selClinic=\''+c.id+'\';renderClinicView();" style="padding:6px 14px;border-radius:12px;border:2px solid '+(on?col.c:'#ddd')+';background:'+(on?col.c:'#fff')+';color:'+(on?'#fff':col.c)+';font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">'+c.n+'</button>';
  }).join('');
  if(!selClinic){document.getElementById('clinicView').innerHTML='<p style="color:#999;text-align:center;padding:40px;">医院を選んでください</p>';return;}
  var days=dim(curY,curM),DOW=['日','月','火','水','木','金','土'];
  var col=getCC(selClinic);
  var firstDow=new Date(curY,curM,1).getDay();
  var h='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">';
  DOW.forEach(function(d,i){h+='<div style="text-align:center;font-size:10px;font-weight:700;padding:4px;color:'+(i===0?'#e05252':i===6?'#4a7fd4':'#999')+';">'+d+'</div>';});
  for(var i=0;i<firstDow;i++)h+='<div></div>';
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    var w=new Date(curY,curM,d).getDay();
    var isH=HOL.has(dateStr);
    var closed=isClosed(dateStr,selClinic);
    var assigned=(shifts[dateStr]||[]).filter(function(s){return s.clinicId===selClinic;});
    var dayCol=w===0||isH?'#e05252':w===6?'#4a7fd4':'#333';
    var bg=closed?'#f0efed':assigned.length?col.b:'#fff';
    var border=closed?'1px solid #ddd':'1px solid '+(assigned.length?col.c+'40':'#eee');
    h+='<div style="background:'+bg+';border:'+border+';border-radius:8px;padding:6px;min-height:90px;">';
    h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;">';
    h+='<span style="font-size:16px;font-weight:800;color:'+dayCol+';">'+d+'</span>';
    if(isH)h+='<span class="hol-badge" style="font-size:9px;padding:2px 5px;">祝</span>';
    if(!closed&&assigned.length)h+='<span style="margin-left:auto;background:'+col.c+';color:#fff;font-size:13px;font-weight:800;border-radius:8px;padding:3px 8px;">'+assigned.length+'名</span>';
    h+='</div>';
    if(closed){h+='<div style="font-size:12px;color:#bbb;text-align:center;">休診</div>';}
    else{
      assigned.forEach(function(s){
        var doc=doctors.find(function(dd){return dd.id===s.docId;});
        if(doc)h+='<div onclick="goToPerson(\''+s.docId+'\')" style="font-size:13px;font-weight:700;color:'+col.c+';cursor:pointer;line-height:1.7;">'+doc.n+'</div>';
      });
    }
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('clinicView').innerHTML=h;
}

function goToPerson(docId){selPerson=docId;setTab(2);}

/* ======= Tab 2: 個人ビュー ======= */
var selPerson=null;
function renderPersonView(){
  var bar=document.getElementById('personSelBar');
  bar.innerHTML=doctors.map(function(doc){
    var on=selPerson===doc.id;
    return '<button class="person-sel'+(on?' on':'')+'" onclick="selPerson=\''+doc.id+'\';renderPersonView();">'+doc.n+'</button>';
  }).join('');
  if(!selPerson){document.getElementById('personView').innerHTML='<p style="color:#999;text-align:center;padding:40px;">ドクターを選んでください</p>';return;}
  var doc=doctors.find(function(d){return d.id===selPerson;});
  var days=dim(curY,curM),DOW=['日','月','火','水','木','金','土'];
  var firstDow=new Date(curY,curM,1).getDay();
  var workDays=0,restIds=new Set(['yasumi','yukyu','daikyu']);
  /* カウント */
  for(var d=1;d<=days;d++){
    var sh=(shifts[ds(curY,curM,d)]||[]).find(function(s){return s.docId===selPerson;});
    if(sh&&!restIds.has(sh.clinicId))workDays++;
  }
  var h='<h3 style="font-size:18px;font-weight:800;margin-bottom:4px;">'+doc.n+'｜'+(curM+1)+'月</h3>';
  h+='<p style="font-size:12px;color:#666;margin-bottom:10px;">出勤 <b style="color:#2e7d32;font-size:16px;">'+workDays+'</b> 日</p>';
  /* 曜日ヘッダー */
  h+='<div class="pcal">';
  DOW.forEach(function(d,i){h+='<div style="text-align:center;font-size:10px;font-weight:700;padding:4px;color:'+(i===0?'#e05252':i===6?'#4a7fd4':'#999')+';">'+d+'</div>';});
  for(var i=0;i<firstDow;i++)h+='<div></div>';
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    var w=new Date(curY,curM,d).getDay();
    var isH=HOL.has(dateStr);
    var sh=(shifts[dateStr]||[]).find(function(s){return s.docId===selPerson;});
    var cls=w===0||isH?'sun':w===6?'sat':'';
    h+='<div class="pcal-cell '+cls+'">';
    h+='<div style="font-weight:800;font-size:14px;color:'+(w===0||isH?'#e05252':w===6?'#4a7fd4':'#333')+';">'+d+(isH?' <span class="hol-badge" style="font-size:8px;padding:1px 4px;">祝</span>':'')+'</div>';
    if(sh){
      var isKibo=sh.clinicId==='yasumi'&&sh.memo==='希望';
      var col=isKibo?{c:'#7b2d8b',b:'#f3e5f5'}:getCC(sh.clinicId);
      var lbl=isKibo?'希望休':shiftLabel(sh);
      h+='<div style="background:'+col.c+';color:#fff;border-radius:6px;padding:4px 6px;font-size:13px;font-weight:700;text-align:center;margin-top:3px;">'+lbl+'</div>';
      /* 同僚表示 */
      if(!restIds.has(sh.clinicId)){
        var mates=(shifts[dateStr]||[]).filter(function(s){return s.docId!==selPerson&&s.clinicId===sh.clinicId;});
        if(mates.length){
          h+='<div style="margin-top:2px;">';
          mates.forEach(function(m){
            var md=doctors.find(function(dd){return dd.id===m.docId;});
            h+='<div style="font-size:12px;color:'+col.c+';font-weight:600;line-height:1.5;">'+(md?md.n:'')+'</div>';
          });
          h+='</div>';
        }
      }
    }
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('personView').innerHTML=h;
}

/* ======= Tab 3: シフト希望申請 ======= */
var reqDocId=null,reqSelDates=new Set(),reqType='yasumi';
function renderReqView(){
  var bar=document.getElementById('reqDocBar');
  bar.innerHTML=doctors.map(function(doc){
    var on=reqDocId===doc.id;
    return '<button class="person-sel'+(on?' on':'')+'" onclick="reqDocId=\''+doc.id+'\';reqSelDates.clear();renderReqView();">'+doc.n+'</button>';
  }).join('');
  if(!reqDocId){document.getElementById('reqView').innerHTML='<p style="color:#999;text-align:center;padding:40px;">名前を選んでください</p>';return;}
  var doc=doctors.find(function(d){return d.id===reqDocId;});
  var days=dim(curY,curM),DOW=['日','月','火','水','木','金','土'];
  var firstDow=new Date(curY,curM,1).getDay();
  var h='<h3 style="font-size:15px;font-weight:800;margin-bottom:8px;">'+doc.n+'｜'+(curM+1)+'月 シフト希望</h3>';
  /* 種類選択 */
  h+='<div style="margin-bottom:10px;">';
  [{id:'yasumi',n:'休み希望',col:'#999'},{id:'yukyu',n:'有給',col:'#e53935'},{id:'daishutsu',n:'代出',col:'#555'},{id:'houmon1',n:'訪1',col:'#2c6e8a'},{id:'houmon2',n:'訪2',col:'#4a9bb5'},{id:'kibou_shutskin',n:'出勤希望',col:'#2e7d32'},{id:'kibou_clinic',n:'希望医院',col:'#1a5276'}].forEach(function(t){
    h+='<button class="req-type'+(reqType===t.id?' on':'')+'" onclick="reqType=\''+t.id+'\';renderReqView();" style="'+(reqType===t.id?'border-color:'+t.col+';background:'+t.col:'')+'">'+t.n+'</button>';
  });
  h+='</div>';
  /* 医院選択（希望医院モード） */
  if(reqType==='kibou_clinic'){
    h+='<div style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px;">';
    CLINICS.forEach(function(c){
      var col=getCC(c.id),on=reqClinicId===c.id;
      h+='<button onclick="reqClinicId=\''+c.id+'\';renderReqView();" style="padding:5px 10px;border-radius:10px;border:2px solid '+(on?col.c:'#ddd')+';background:'+(on?col.c:'#fff')+';color:'+(on?'#fff':col.c)+';font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;">'+c.n+'</button>';
    });
    h+='</div>';
  }
  /* カレンダー */
  h+='<div class="req-cal">';
  DOW.forEach(function(d,i){h+='<div style="text-align:center;font-size:10px;font-weight:700;padding:4px;color:'+(i===0?'#e05252':i===6?'#4a7fd4':'#999')+';">'+d+'</div>';});
  for(var i=0;i<firstDow;i++)h+='<div></div>';
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    var w=new Date(curY,curM,d).getDay();
    var isH=HOL.has(dateStr);
    var sel=reqSelDates.has(dateStr);
    var existing=(shifts[dateStr]||[]).find(function(s){return s.docId===reqDocId;});
    var exLbl=existing?shiftLabel(existing):'';
    /* 休診医院を集める */
    var closedClinics=CLINICS.filter(function(c){return isClosed(dateStr,c.id);});
    var cellBg=sel?'#f3e5f5':isH?'#fff0f0':w===0?'#fff5f5':w===6?'#f0f5ff':'#fff';
    h+='<div class="req-cell'+(sel?' sel':'')+'" onclick="toggleReqDate(\''+dateStr+'\')" style="background:'+cellBg+';color:'+(w===0||isH?'#e05252':w===6?'#4a7fd4':'#333')+';">';
    h+='<div style="font-weight:700;">'+d+(isH?' <span class="hol-badge">祝</span>':'')+'</div>';
    if(closedClinics.length&&closedClinics.length<CLINICS.length){
      h+='<div style="font-size:7px;color:#999;line-height:1.3;margin-top:1px;">休:'+closedClinics.map(function(c){return c.n;}).join(',')+'</div>';
    } else if(closedClinics.length>=CLINICS.length){
      h+='<div style="font-size:7px;color:#bbb;">全休</div>';
    }
    if(exLbl)h+='<div style="font-size:8px;color:#7b2d8b;font-weight:600;">現:'+exLbl+'</div>';
    if(sel)h+='<div style="font-size:9px;color:#7b2d8b;font-weight:800;">✓</div>';
    h+='</div>';
  }
  h+='</div>';
  /* 送信ボタン */
  h+='<div style="margin-top:12px;text-align:center;">';
  h+='<button onclick="submitReq()" style="padding:10px 30px;border:none;background:#7b2d8b;color:#fff;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;">'+reqSelDates.size+'日分を申請する</button>';
  h+='</div>';
  /* 申請履歴一覧 */
  var days2=dim(curY,curM),DOW2=['日','月','火','水','木','金','土'];
  var reqs=[];
  for(var d2=1;d2<=days2;d2++){
    var ds2=ds(curY,curM,d2);
    var ex=(shifts[ds2]||[]).find(function(s){return s.docId===reqDocId;});
    if(ex)reqs.push({d:d2,ds:ds2,w:new Date(curY,curM,d2).getDay(),sh:ex});
  }
  if(reqs.length){
    h+='<div style="margin-top:16px;border-top:2px solid #eee;padding-top:12px;">';
    h+='<h4 style="font-size:13px;font-weight:700;margin-bottom:8px;">現在の登録状況</h4>';
    h+='<table style="border-collapse:collapse;width:100%;font-size:12px;"><tbody>';
    reqs.forEach(function(r){
      var isKibo=r.sh.clinicId==='yasumi'&&r.sh.memo==='希望';
      var bgCol,txtCol='#fff';
      if(isKibo){bgCol='#7b2d8b';}
      else if(r.sh.clinicId==='yasumi'){bgCol='#999';}
      else if(r.sh.clinicId==='yukyu'){bgCol='#e53935';}
      else if(r.sh.clinicId==='daikyu'){bgCol='#1a5276';}
      else if(r.sh.clinicId==='daishutsu'){bgCol='#555';}
      else{bgCol=getCC(r.sh.clinicId).c;}
      var lbl=shiftLabel(r.sh);
      h+='<tr style="border-bottom:1px solid #eee;">';
      h+='<td style="padding:4px 8px;font-weight:700;color:'+(r.w===0?'#e05252':r.w===6?'#4a7fd4':'#333')+';width:70px;">'+r.d+'('+DOW2[r.w]+')</td>';
      h+='<td style="padding:4px 8px;"><span style="background:'+bgCol+';color:'+txtCol+';padding:2px 8px;border-radius:6px;font-weight:700;font-size:11px;">'+lbl+'</span></td>';
      h+='<td style="padding:4px;width:40px;"><button onclick="cancelReq(\''+r.ds+'\',\''+reqDocId+'\')" style="border:none;background:#fdf0ee;color:#b83030;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;">取消</button></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }
  document.getElementById('reqView').innerHTML=h;
}
var reqClinicId=null;
function cancelReq(dateStr,docId){
  snapshot();
  if(shifts[dateStr]){
    shifts[dateStr]=shifts[dateStr].filter(function(s){return s.docId!==docId;});
    if(!shifts[dateStr].length)delete shifts[dateStr];
  }
  dbDel(dateStr,docId);saveShifts();
  showSb('取り消しました','ok');
  renderReqView();
}
function toggleReqDate(dateStr){reqSelDates.has(dateStr)?reqSelDates.delete(dateStr):reqSelDates.add(dateStr);renderReqView();}
function submitReq(){
  if(!reqDocId||!reqSelDates.size)return;
  snapshot();
  reqSelDates.forEach(function(dateStr){
    if(!shifts[dateStr])shifts[dateStr]=[];
    var idx=shifts[dateStr].findIndex(function(s){return s.docId===reqDocId;});
    var cid,memo='';
    if(reqType==='yasumi'){cid='yasumi';memo='希望';}
    else if(reqType==='yukyu'){cid='yukyu';}
    else if(reqType==='daishutsu'){cid='daishutsu';memo='';}
    else if(reqType==='houmon1'){cid='houmon1';memo='';}
    else if(reqType==='houmon2'){cid='houmon2';memo='';}
    else if(reqType==='kibou_shutskin'){cid='kibou_shutskin';memo='希望出勤';}
    else if(reqType==='kibou_clinic'){cid=reqClinicId||'yasumi';memo='希望医院';}
    var entry={docId:reqDocId,clinicId:cid,memo:memo};
    if(idx>=0)shifts[dateStr][idx]=entry;else shifts[dateStr].push(entry);
    dbSave(dateStr,reqDocId,cid,memo);
  });
  reqSelDates.clear();
  saveShifts();
  showSb('シフト希望を申請しました','ok');
  renderReqView();
}

/* ======= 削除モード対応 ======= */
var origCellClick=cellClick;
cellClick=function(dateStr,docId){
  if(paintClinic==='__del__'){
    snapshot();
    if(shifts[dateStr]){
      shifts[dateStr]=shifts[dateStr].filter(function(s){return s.docId!==docId;});
      if(!shifts[dateStr].length)delete shifts[dateStr];
    }
    dbDel(dateStr,docId);
    renderShifts();
    return;
  }
  origCellClick(dateStr,docId);
};

/* ======= 初期化 ======= */
updateMonthLbl();
loadData().then(function(){renderTab();});
window.addEventListener('beforeunload',function(){saveShifts();saveClosed();});
</script>
