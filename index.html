<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackfilm | 削らないラミネートベニア 日本初上陸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400;600&family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080808;
  --deep: #0f0f0f;
  --charcoal: #1a1a1a;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --white: #f8f5f0;
  --off-white: #e8e4dd;
  --text-muted: #b8b8b0;
  --text-body: #dedad4;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background-color: var(--black);
  color: var(--text-body);
  font-family: 'Montserrat', 'Noto Serif JP', serif;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Base UI Elements */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
}

section {
  padding: 100px 0;
  position: relative;
}

/* Typography */
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 300;
  text-align: center;
  margin-bottom: 60px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
}

.section-title span {
  display: block;
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  margin-top: 15px;
}

p { margin-bottom: 20px; color: var(--text-body); }
.text-serif { font-family: 'Noto Serif JP', serif; }
.text-muted { color: var(--text-muted); }
.text-gold { color: var(--gold); }
.text-center { text-align: center; }

/* CTA Buttons (Link unified) */
.cta-container {
  text-align: center;
  margin-top: 60px;
}

.cta-primary {
  display: inline-block;
  padding: 18px 48px;
  background: linear-gradient(135deg, var(--gold) 0%, #a68536 100%);
  color: #fff !important;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-radius: 2px;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
  border: none;
  cursor: pointer;
}

.cta-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(201,168,76,0.3);
}

.cta-primary::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: 0.5s;
}

.cta-primary:hover::before {
  left: 100%;
}

/* Smartphone Optimization */
@media (max-width: 480px) {
  .container { padding: 0 20px; }
  .section-title { font-size: 28px !important; }
  .mobile-fixed-cta {
    display: block;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    padding: 10px 15px 25px;
    background: linear-gradient(to top, rgba(8,8,8,1) 70%, rgba(8,8,8,0));
  }
  .mobile-fixed-cta .cta-primary {
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 20px rgba(201,168,76,0.4);
    animation: pulse-gold 2s infinite;
  }
  footer { padding-bottom: 90px !important; }
}

@keyframes pulse-gold {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

@media (min-width: 481px) {
  .mobile-fixed-cta { display: none; }
}

/* ===== NEW HERO SECTION (No sticky, Larger Logo) ===== */
.hero {
  height: 100vh; /* 画面いっぱいに表示 */
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--black);
  position: relative;
  overflow: hidden;
  padding: 0; /* セクションのデフォルトパディングを解除 */
}

/* フィルム（ロゴ）の背景演出。元の画像パスを維持。 */
.hero-bg-film {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('images/blackfilm_logo.png'); /* 画像パスは元のまま */
  background-position: center;
  background-repeat: no-repeat;
  background-size: 160% auto; /* 画面からはみ出るくらい大きく */
  opacity: 0.15; /* 既存の雰囲気を踏襲し、薄く表示 */
  filter: blur(2px); /* 少しぼかして奥行きを出す */
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 10;
  text-align: center;
  max-width: 900px;
  padding: 0 20px;
}

.hero-badge {
  display: inline-block;
  padding: 6px 16px;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-size: 12px;
  letter-spacing: 0.3em;
  margin-bottom: 30px;
  text-transform: uppercase;
}

.hero-h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(40px, 8vw, 80px); /* 以前より大幅に大きく */
  font-weight: 300;
  line-height: 1.2;
  margin-bottom: 30px;
  letter-spacing: 0.1em;
  background: linear-gradient(to bottom, #fff 0%, #a0a0a0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-h1 span {
  display: block;
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(16px, 2.5vw, 20px);
  -webkit-text-fill-color: var(--text-muted);
  margin-top: 15px;
  letter-spacing: 0.1em;
}

.hero-desc {
  font-size: clamp(14px, 1.5vw, 16px);
  color: var(--text-body);
  margin-bottom: 50px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

/* スマホ用Hero微調整 */
@media (max-width: 480px) {
  .hero-bg-film {
    background-size: 250% auto; /* スマホではさらに拡大 */
  }
  .hero-h1 {
    font-size: 40px !important;
    line-height: 1.3 !important;
  }
  .hero-h1 span {
    font-size: 14px !important;
  }
  .hero-desc {
    font-size: 14px !important;
    line-height: 1.8;
  }
}

/* ===== END NEW HERO SECTION ===== */

</style>
</head>

</body>
