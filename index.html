<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>清翔会 シフト</title>
<style>
:root{--bg:#f5f4f0;--card:#fff;--ink:#1a1a18;--ink2:#6b6965;--ink3:#b0ada8;--border:#e8e5e0;--hdr:#1a1a18;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;padding-bottom:20px;}
/* CLINIC COLORS */
.cc-esca{--cc:#c0392b;--cb:#fdf0ee;}.cc-r{--cc:#7030a0;--cb:#f5eef8;}
.cc-wiz{--cc:#1e8449;--cb:#e9f7ef;}.cc-luminas{--cc:#27ae60;--cb:#e8f5e9;}
.cc-chaya{--cc:#d4a017;--cb:#fef9e7;}.cc-asano{--cc:#85200c;--cb:#fdf3ea;}
.cc-chiryu{--cc:#0a6b8a;--cb:#e0f2f8;}.cc-komaki{--cc:#d81b60;--cb:#fce4ec;}
.cc-yagoto{--cc:#8b4513;--cb:#f9ece2;}.cc-omori{--cc:#1f6b4e;--cb:#e4f4ed;}
.cc-kyoto{--cc:#6b3a87;--cb:#f2ecf8;}.cc-ginza{--cc:#7d6608;--cb:#f8f3e2;}
.cc-houmon{--cc:#2c6e8a;--cb:#e6eef5;}.cc-yasumi{--cc:#999;--cb:#f2f2f0;}
.cc-yukyu{--cc:#c0392b;--cb:#f0f0ee;}.cc-daikyu{--cc:#1a5276;--cb:#e8f4fd;}
.cc-daishutsu{--cc:#555;--cb:#f0f0ee;}.cc-kyushutsu{--cc:#e67e22;--cb:#fef5e7;}
/* HEADER */
.hdr{background:#e8f4fd;color:#1a1a18;height:48px;display:flex;align-items:center;padding:0 12px;gap:6px;position:sticky;top:0;z-index:200;box-shadow:0 1px 6px rgba(0,0,0,.10);transition:background .3s;}
.hdr.admin-mode{background:#e8f5e9 !important;}
.hdr-title{font-size:14px;font-weight:800;letter-spacing:.02em;color:#1a1a18;white-space:nowrap;}
.hdr-tab{background:transparent;border:1px solid #b0cfe8;color:#2d6a9f;font-family:inherit;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;transition:.15s;white-space:nowrap;}
.hdr-tab.on{background:#2d6a9f;color:#fff;border-color:#2d6a9f;}
.hdr.admin-mode .hdr-tab{border-color:#81c784;color:#2e7d32;}
.hdr.admin-mode .hdr-tab.on{background:#2e7d32;color:#fff;border-color:#2e7d32;}
.hdr-tab:active{opacity:.8;}
.month-nav-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:3px 12px;background:var(--card);border-bottom:1px solid var(--border);}
.mnav{display:flex;align-items:center;gap:4px;}
.mnav-btn{width:30px;height:30px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--ink2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.mnav-lbl{font-size:13px;font-weight:700;min-width:80px;text-align:center;color:var(--ink);}
.hdr-btn{padding:5px 10px;border:1px solid #b0cfe8;border-radius:8px;background:transparent;color:#2d6a9f;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;}
.hdr.admin-mode .hdr-btn{border-color:#81c784;color:#2e7d32;}
/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:100;}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;border-bottom:3px solid transparent;transition:.2s;letter-spacing:.02em;}
.tab.on{color:#1a1a18;border-bottom-color:#1a1a18;}
/* TABLE (医院・人数タブ) */
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stbl{border-collapse:collapse;white-space:nowrap;}
.stbl th,.stbl td{border:0.5px solid var(--border);}
.col-head{position:sticky;left:0;z-index:12;background:#edebe6;font-size:11px;font-weight:600;padding:6px 8px;min-width:64px;max-width:64px;border-right:1px solid #d8d4cc;}
.date-th{min-width:46px;text-align:center;background:#edebe6;padding:5px 2px;font-size:11px;font-weight:500;position:sticky;top:0;z-index:8;}
.dow{display:block;font-size:9px;font-weight:400;color:var(--ink3);margin-top:1px;}
.date-th.sun,.tc.sun{background:#fff5f5!important;}
.date-th.sat,.tc.sat{background:#f0f5ff!important;}
.date-th.today{background:#fff3cd!important;font-weight:700;color:#c47d00!important;}
.tc.today-c{background:#fff9e6!important;}
.date-th.closed-h{background:#ececea!important;opacity:.75;}
.tc.closed-c{background:#f0efed!important;}
.tc{min-width:30px;vertical-align:top;padding:1px;background:var(--card);text-align:center;}
.pills{display:flex;flex-direction:column;gap:1px;min-height:20px;align-items:center;}
.pill{display:inline-flex;align-items:center;justify-content:center;padding:1px 3px;border-radius:3px;font-size:9px;font-weight:600;line-height:1.3;}
/* COUNT */
.ctbl{border-collapse:collapse;width:100%;}
.ctbl th,.ctbl td{border:0.5px solid var(--border);padding:4px 3px;text-align:center;font-size:11px;}
.ctbl th{background:#edebe6;font-weight:600;position:sticky;top:0;z-index:8;}
.c-fix{position:sticky;left:0;z-index:5;}
.cnum{font-size:14px;font-weight:700;display:block;}
.cnames{font-size:8px;color:var(--ink3);display:block;line-height:1.5;margin-top:1px;}
/* LEGEND */
.legend{padding:6px 12px;display:flex;flex-wrap:wrap;gap:5px;background:var(--card);border-bottom:1px solid var(--border);}
.leg{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--ink2);background:var(--bg);padding:2px 7px;border-radius:10px;}
.leg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
/* ===== VIEW B: 人タブ ===== */
.doc-sel-bar{padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;display:flex;gap:6px;-webkit-overflow-scrolling:touch;;scrollbar-width:none;}
.doc-sel-chip{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--ink2);font-family:inherit;font-weight:600;transition:.15s;}
.doc-sel-chip:active{transform:scale(.95);}
.doc-sel-chip.on{background:#1a1a18;color:#fff;border-color:#1a1a18;box-shadow:0 2px 8px rgba(0,0,0,.15);}
/* カレンダー */
.cal-wrap{padding:12px;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.cal-dow-lbl{text-align:center;font-size:10px;color:var(--ink3);padding:4px 0;}
.cal-dow-lbl.sun{color:#c0392b;}.cal-dow-lbl.sat{color:#1a5276;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day-cell{border-radius:8px;min-height:52px;padding:4px;background:var(--card);border:0.5px solid var(--border);cursor:pointer;position:relative;transition:all .12s;}
.day-cell:active{opacity:.7;}
.day-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.day-cell.sun{background:#fff5f5;}.day-cell.sat{background:#f0f5ff;}
.day-cell.closed-day{background:#f0efed;opacity:.7;}
.day-cell.today-day{border:2px solid #f39c12;background:#fff9e6;box-shadow:0 0 0 1px #f39c12;}
.day-num{font-size:11px;font-weight:500;color:var(--ink2);display:block;}
.day-cell.sun .day-num{color:#c0392b;}.day-cell.sat .day-num{color:#1a5276;}
.day-shift{display:block;margin-top:2px;padding:2px 4px;border-radius:4px;font-size:9px;font-weight:700;text-align:center;line-height:1.3;}
.no-doc-msg{padding:40px;text-align:center;color:var(--ink3);font-size:13px;}
/* よく行く医院 */
.freq-bar{padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.freq-lbl{font-size:10px;color:var(--ink3);font-weight:600;white-space:nowrap;}
.freq-pill{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
.freq-pill:active{opacity:.7;}
/* QPOP (クイック入力ポップアップ) */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.on{opacity:1;pointer-events:all;}
.sheet{background:var(--card);border-radius:22px 22px 0 0;padding:20px 16px 40px;width:100%;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);box-shadow:0 -4px 30px rgba(0,0,0,.12);}
.overlay.on .sheet{transform:none;}
.sh-title{font-size:16px;font-weight:700;margin-bottom:2px;}
.sh-sub{font-size:12px;color:var(--ink3);margin-bottom:14px;}
.sec-lbl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;}
.clinic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.clinic-btn{padding:11px 4px;border-radius:10px;border:2px solid transparent;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:.1s;}
.clinic-btn:active{opacity:.7;}
.clinic-btn.cur{border-width:2px;}
.rest-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.rest-btn{padding:10px 4px;border-radius:10px;border:1.5px solid var(--border);font-family:inherit;font-size:12px;cursor:pointer;text-align:center;background:var(--bg);color:var(--ink2);}
.rest-btn.on{background:#edebe6;border-color:var(--ink);color:var(--ink);font-weight:700;}
.more-btn{width:100%;padding:10px;border:none;background:var(--bg);border-radius:8px;font-family:inherit;font-size:12px;color:var(--ink2);cursor:pointer;margin-bottom:14px;}
.all-clinic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.btns{display:flex;gap:8px;margin-top:4px;}
.btn{padding:13px 16px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;flex:1;}
.btn-prim{background:var(--ink);color:#fff;}.btn-prim:active{background:#333;}
.btn-ghost{background:var(--bg);color:var(--ink2);flex:0 0 auto;padding:13px 18px;}
.btn-del{background:#fdf0ee;color:#b83030;flex:0 0 auto;padding:13px 14px;}
/* ===== VIEW B 2ペインレイアウト ===== */
.b-layout{display:flex;height:calc(100vh - 100px);overflow:hidden;}
.b-left{flex:0 0 340px;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.b-right{flex:1;overflow:auto;background:var(--bg);}
.b-right-title{padding:8px 12px;font-size:11px;font-weight:600;color:var(--ink3);background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;}
/* 医院選択バー */
.clinic-pick-lbl{padding:8px 12px 4px;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.clinic-pick-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 10px;border-bottom:1px solid var(--border);}
.clinic-pick-btn{padding:9px 14px;border-radius:20px;border:2px solid transparent;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.clinic-pick-btn:active{transform:scale(.95);}
.clinic-pick-btn.on{border-width:2px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
/* カレンダー（コンパクト） */
.cal-wrap{padding:10px 10px 6px;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-dow-lbl{text-align:center;font-size:9px;color:var(--ink3);padding:3px 0;}
.cal-dow-lbl.sun{color:#c0392b;}.cal-dow-lbl.sat{color:#1a5276;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.day-cell{border-radius:8px;min-height:46px;padding:4px;background:var(--card);border:0.5px solid var(--border);cursor:pointer;transition:all .12s;}
.day-cell:active{transform:scale(.93);opacity:.85;}
.day-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.day-cell.sun{background:#fff5f5;}.day-cell.sat{background:#f0f5ff;}
.day-cell.closed-day{background:#f0efed;opacity:.6;cursor:default;}
.day-cell.today-day{border:2px solid var(--ink);}
.day-num{font-size:10px;font-weight:500;color:var(--ink2);display:block;line-height:1;}
.day-cell.sun .day-num{color:#c0392b;}.day-cell.sat .day-num{color:#1a5276;}
.day-shift{display:block;margin-top:2px;padding:2px 2px;border-radius:3px;font-size:8px;font-weight:700;text-align:center;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-cell.sel-clinic:not(.has-shift){background:rgba(0,0,0,.04);border-style:dashed;}
/* 全員一覧（右ペイン・閲覧） */
.all-tbl{border-collapse:collapse;white-space:nowrap;font-size:10px;table-layout:fixed;}
.all-tbl th,.all-tbl td{border:0.5px solid var(--border);padding:2px 3px;}
.all-th-name{position:sticky;left:0;top:0;z-index:11;background:#edebe6;font-weight:600;padding:4px 6px;min-width:44px;white-space:nowrap;}
.all-th-date{width:42px;min-width:36px;max-width:36px;text-align:center;background:#edebe6;font-weight:500;padding:3px 2px;position:sticky;top:0;z-index:9;overflow:hidden;}
.all-td-name{position:sticky;left:0;z-index:4;background:var(--card);font-size:10px;padding:2px 6px;font-weight:500;}
.all-td-cell{text-align:center;padding:1px 2px;background:var(--card);width:42px;max-width:42px;overflow:hidden;vertical-align:top;}
.all-pill{display:block;padding:1px 2px;border-radius:2px;font-size:8px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* スマホ: 右ペインは非表示 */
@media(max-width:680px){
  #vA, #vB-view{height:calc(100vh - 112px) !important;}
  #docCalOv, #clinicCalOv{align-items:flex-end !important;padding:0 !important;}
  #docCalOv .sheet, #clinicCalOv .sheet{max-width:100% !important;border-radius:18px 18px 0 0 !important;max-height:92vh !important;}
  .day-cell{min-height:50px !important;}
  .clinic-pick-btn{padding:10px 14px !important;font-size:12px !important;}
  .date-th{min-width:36px !important;}
  .col-head{min-width:44px !important;max-width:44px !important;font-size:10px !important;}
  .pill{font-size:9px !important;padding:1px 3px !important;}
  .b-layout{height:auto;flex-direction:column;}
  .b-left{flex:none;border-right:none;overflow:visible;}
  .b-right{display:none;}
}
/* AUTH / SETTINGS */
.c-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.c-overlay.on{opacity:1;pointer-events:all;}
.c-modal{background:var(--card);border-radius:18px;padding:24px 20px;width:320px;max-width:92vw;transform:scale(.95);transition:transform .2s;}
.c-overlay.on .c-modal{transform:scale(1);}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;}
.fg input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:14px;background:var(--bg);color:var(--ink);outline:none;}
.stab-bar{display:flex;gap:6px;margin:12px 0 14px;overflow-x:auto;}
.stab{padding:7px 14px;border-radius:8px;font-family:inherit;font-size:12px;border:none;cursor:pointer;white-space:nowrap;background:var(--bg);color:var(--ink2);}
.stab.on{background:var(--ink);color:#fff;}
.rank-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;background:var(--bg);margin-bottom:3px;}
/* ===== 印刷用CSS ===== */
@media print {
  body{background:#fff !important;font-size:8pt;}
  .hdr,.tabs,.legend,.doc-sel-bar,.clinicPickBar,#multiSelBar,
  .b-right,.overlay,.c-overlay,#sb{display:none !important;}
  .b-layout{display:block !important;height:auto !important;}
  .b-left{border:none !important;overflow:visible !important;}
  #vA,#vB,#vC,#vD{display:block !important;height:auto !important;overflow:visible !important;}
  .twrap,.b-left>div{overflow:visible !important;height:auto !important;}
  .stbl,.all-tbl,.ctbl{width:100%;font-size:7pt;}
  .stbl th,.stbl td,.all-tbl th,.all-tbl td,.ctbl th,.ctbl td{
    padding:1px 2px !important;font-size:7pt !important;}
  .col-head,.all-th-name,.all-td-name{
    position:static !important;background:#eee !important;}
  .date-th,.all-th-date{position:static !important;background:#eee !important;}
  .pill,.all-pill,.day-shift{font-size:6pt !important;padding:0 1px !important;}
  @page{margin:8mm;size:A4 landscape;}
}
.month-nav-bar{
  display:flex;align-items:center;justify-content:center;gap:0;
  padding:8px 16px;background:var(--card);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.mnav-btn2{
  width:32px;height:30px;border:1.5px solid var(--border);background:var(--bg);
  font-size:22px;font-weight:600;cursor:pointer;color:var(--ink);
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.mnav-btn2:first-child{border-radius:12px 0 0 12px;border-right:none;}
.mnav-btn2:last-child{border-radius:0 12px 12px 0;border-left:none;}
.mnav-btn2:active{background:var(--border);}
.mnav-lbl2{
  font-size:13px;font-weight:700;padding:0 14px;height:30px;
  display:flex;align-items:center;border:1.5px solid var(--border);
  background:var(--card);letter-spacing:.02em;white-space:nowrap;
}
#sb{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;display:none;color:#fff;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);letter-spacing:.02em;}
@media(min-width:680px){.overlay{align-items:center;}.sheet{border-radius:18px;max-width:520px;margin:auto;transform:scale(.97);}.overlay.on .sheet{transform:none;}}

thead .col-head{top:0;z-index:15;}
thead .date-th{top:0;}
</style>
</head>
<body>

<div class="hdr" id="mainHdr">
  <span class="hdr-title" id="hdrTitle">清翔会 シフト</span>
  <span id="hdrAdminBadge" style="display:none;background:#2e7d32;color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.04em;white-space:nowrap;">管理画面</span>
  <div style="display:flex;gap:2px;margin:0 6px;">
    <button class="hdr-tab" id="htab0">人</button>
    <button class="hdr-tab" id="htab1">医院</button>
    <button class="hdr-tab" id="htab2">人数</button>
    <button class="hdr-tab" id="htab3" style="display:none;">集計</button>
  </div>
  <div style="flex:1;"></div>
  <button class="hdr-btn" id="printBtn" style="font-size:13px;">🖨</button>
  <button class="hdr-btn" id="setBtn" style="display:none;">⚙️</button>
  <button class="hdr-btn" id="authBtn">ログイン</button>
</div>
<div class="month-nav-bar">
  <button class="mnav-btn2" id="prevBtn">&#8249;</button>
  <span class="mnav-lbl2" id="mLbl"></span>
  <button class="mnav-btn2" id="nextBtn">&#8250;</button>
  <button id="thisMonthBtn" style="margin-left:8px;padding:4px 12px;height:30px;border:1.5px solid #2d6a9f;border-radius:8px;background:#e8f4fd;color:#2d6a9f;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;">今月</button>
</div>
<div class="legend" id="legend"></div>

<!-- VIEW A: 人 -->
<div id="vA">
  <!-- 管理モード: 左右2ペイン -->
  <div id="vB-admin" style="display:none">
    <div class="b-layout">
      <div class="b-left">
        <div class="doc-sel-bar" id="docSelBar"></div>
        <div id="clinicPickBar" style="display:none">
          <div class="clinic-pick-lbl">医院を選んで → 日付をポチポチ</div>
          <div class="clinic-pick-row" id="clinicPickRow"></div>
        </div>
        <div class="no-doc-msg" id="noDocMsg">ドクターを選んでください</div>
        <div id="calMain" style="display:none">
          <div id="multiSelBar" style="display:none;padding:7px 12px;background:#fff3e0;border-bottom:1px solid #f5d88a;align-items:center;gap:8px;font-size:11px;color:#b8691a;">
            <span id="multiSelCount" style="font-weight:700;flex:1;"></span>

/* ---- COLOR ---- */
const ccache={};
function getCC(id){
  if(ccache[id])return ccache[id];
  var p=ALL.find(function(x){return x.id===id;});
  if(!p)return{c:'#888',b:'#f5f5f5'};
  var el=document.createElement('div');el.className=p.cc;
  el.style.cssText='position:absolute;opacity:0;pointer-events:none;';
  document.body.appendChild(el);
  var s=getComputedStyle(el);
  var r={c:s.getPropertyValue('--cc').trim(),b:s.getPropertyValue('--cb').trim()};
  document.body.removeChild(el);
  return ccache[id]=r;
}
function cname(id){var p=ALL.find(function(x){return x.id===id;});return p?p.n:id;}

function dow(d){return new Date(curY,curM,d).getDay();}
function isToday(d){return today.getFullYear()===curY&&today.getMonth()===curM&&today.getDate()===d;}
function isClosed(dateStr,cid){
  var d=new Date(dateStr),w=d.getDay();
  if(cid&&CLOSED[cid]&&CLOSED[cid].includes(w))return true;
  if(cid==='yagoto')return false;
  if(w===0)return true;
  if(HOL.has(dateStr))return true;
  return false;
}

  opts=opts||{};opts.headers=Object.assign({},SB_H,opts.headers||{});

  if(!r.ok)throw new Error(await r.text());
  return r.status===204?null:r.json();
}

    return '<th style="min-width:34px;max-width:34px;text-align:center;font-size:9px;position:sticky;top:0;z-index:9;background:#edebe6;padding:3px 2px;cursor:pointer;overflow:hidden;border:0.5px solid var(--border);" data-open-doc="'+doc.id+'">'+
      doc.n+(doc.memo?'<span style="display:block;font-size:7px;color:var(--ink3);font-weight:400">'+doc.memo+'</span>':'')+
      '</th>';
  }
  function docThBot(doc){
    return '<th style="min-width:34px;max-width:34px;text-align:center;font-size:9px;position:sticky;bottom:0;z-index:9;background:#edebe6;padding:3px 2px;cursor:pointer;overflow:hidden;border:0.5px solid var(--border);" data-open-doc="'+doc.id+'">'+
      doc.n+(doc.memo?'<span style="display:block;font-size:7px;color:var(--ink3);font-weight:400">'+doc.memo+'</span>':'')+
      '</th>';
  }
  function dateThBot(pos){
    var border=pos==='left'?'border-right:2px solid #d8d4cc;':'border-left:2px solid #d8d4cc;';
    return '<th style="min-width:30px;width:30px;text-align:center;position:sticky;bottom:0;'+pos+':0;background:#edebe6;z-index:15;padding:3px 4px;font-size:10px;font-weight:600;border:0.5px solid var(--border);'+border+';">日付</th>';
  }

  var headRow='<tr>'+dateTh('left')+doctors.map(docTh).join('')+dateTh('right')+'</tr>';
  var footRow='<tr>'+dateThBot('left')+doctors.map(docThBot).join('')+dateThBot('right')+'</tr>';

  var h='<table style="border-collapse:collapse;white-space:nowrap;font-size:10px;table-layout:fixed;">';
  h+='<thead>'+headRow+'</thead>';
  h+='<tfoot style="position:sticky;bottom:0;z-index:8;">'+footRow+'</tfoot>';
  h+='<tbody>';

  var DOW2=['日','月','火','水','木','金','土'];
  for(var d=1;d<=days;d++){
    var dateStr=ds(d),w=dow(d);
    var isSun=w===0,isSat=w===6;
    var hol=HOL.has(dateStr)&&!isToday(d);
    var isT2=isToday(d);
var rowBg=isSun?'#fff5f5':isSat?'#f0f5ff':isT2?'#fff9e6':hol?'#f0efed':'var(--card)';
    var dateColor=isSun?'#c0392b':isSat?'#1a5276':'var(--ink2)';
    var dowColor=isSun?'#c0392b':isSat?'#1a5276':'var(--ink3)';
    var dcStyle='position:sticky;text-align:center;font-size:10px;font-weight:600;color:'+dateColor+';padding:3px 4px;border:0.5px solid var(--border);width:30px;min-width:30px;background:'+rowBg+';z-index:6;';
    var todayBorder=isT2?'box-shadow:inset 3px 0 0 #f39c12,3px 0 6px rgba(0,0,0,.04);':'box-shadow:3px 0 6px rgba(0,0,0,.04);';
var dateCell='<td style="'+dcStyle+'left:0;border-right:2px solid #d8d4cc;'+todayBorder+'">'+d+'<span style="display:block;font-size:8px;font-weight:400;color:'+dowColor+'">'+DOW2[w]+'</span></td>';
    var todayBorder2=isT2?'box-shadow:inset -3px 0 0 #f39c12,-3px 0 6px rgba(0,0,0,.04);':'box-shadow:-3px 0 6px rgba(0,0,0,.04);';
var dateCell2='<td style="'+dcStyle+'right:0;border-left:2px solid #d8d4cc;'+todayBorder2+'">'+d+'<span style="display:block;font-size:8px;font-weight:400;color:'+dowColor+'">'+DOW2[w]+'</span></td>';

    h+='<tr>'+dateCell;
    doctors.forEach(function(doc){
      var sh=(shifts[dateStr]||[]).find(function(s){return s.docId===doc.id;});
      var isDai=sh&&sh.clinicId==='daishutsu';
      var isKyu=sh&&sh.memo==='休出';
      h+='<td style="text-align:center;padding:1px 2px;background:'+rowBg+';width:34px;max-width:34px;overflow:hidden;vertical-align:middle;border:0.5px solid var(--border);">';
      if(sh){
        if(isDai){
          h+='<span style="display:block;background:#f0f0ee;color:#888;padding:1px 2px;border-radius:2px;font-size:8px;font-weight:700;">代出</span>';
        } else {
          var c=getCC(sh.clinicId);
          h+='<span style="display:block;background:'+c.b+';color:'+c.c+';padding:1px 2px;border-radius:2px;font-size:8px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+cname(sh.clinicId)+'</span>';
          if(sh.memo==='代出')h+='<span style="font-size:6px;color:#999;display:block;">代出</span>';
          if(isKyu)h+='<span style="font-size:6px;color:#e67e22;font-weight:700;display:block;">休出</span>';
        }
      }
      h+='</td>';
    });
    h+=dateCell2+'</tr>';
  }
  h+='</tbody></table>';
  el.innerHTML='<div style="overflow:auto;height:calc(100vh - 112px);-webkit-overflow-scrolling:touch;">'+h+'</div>';

  el.querySelectorAll('[data-open-doc]').forEach(function(th){
    th.addEventListener('click',function(){openDocCal(th.dataset.openDoc);});
  });
}

function renderClinicPickBar(){
  if(!selDocId){
    document.getElementById('clinicPickBar').style.display='none';
    document.getElementById('noDocMsg').style.display='';
    document.getElementById('calMain').style.display='none';
    return;
  }
  document.getElementById('noDocMsg').style.display='none';
  document.getElementById('calMain').style.display='';
  document.getElementById('clinicPickBar').style.display='';

  var freq=FREQ_MAP[selDocId]||[];
  var shown=new Set(freq);
  var html2='';

  freq.forEach(function(cid){
    var c=getCC(cid),on=(selClinicId===cid);
    var bg=on?c.c:c.b;
    var col=on?'#fff':c.c;
    var border=on?'border:2px solid '+c.c+';':'border:2px solid '+c.b+';';
    html2+='<button class="clinic-pick-btn" data-cid="'+cid+'" style="background:'+bg+';color:'+col+';'+border+'font-weight:700;">'+cname(cid)+'</button>';

    html2+='<button class="clinic-pick-btn" data-cid="'+cl.id+'" style="background:'+bg+';color:'+col+';'+border+'font-size:11px;">'+cl.n+'</button>';
  });

  STATUSES.forEach(function(s){
    var on=(selClinicId===s.id);
    var bg=on?'#1a1a18':'var(--bg)';
    var col=on?'#fff':'var(--ink3)';
    var border=on?'border:2px solid #1a1a18;':'border:1.5px solid var(--border);';
    html2+='<button class="clinic-pick-btn" data-cid="'+s.id+'" style="background:'+bg+';color:'+col+';'+border+'font-size:11px;">'+s.n+'</button>';
  });

  document.getElementById('clinicPickRow').innerHTML=html2;
}


function saveToDate(dateStr){
  if(!selDocId||!selClinicId)return;
  if(multiSelDates.has(dateStr))return;
  multiSelDates.add(dateStr);
  if(!shifts[dateStr])shifts[dateStr]=[];
  var idx=shifts[dateStr].findIndex(function(s){return s.docId===selDocId;});
  var entry={docId:selDocId,clinicId:selClinicId,memo:''};
  if(idx>=0)shifts[dateStr][idx]=entry;else shifts[dateStr].push(entry);
  renderCalGrid();
  renderAllView('allViewWrap');
  renderA();renderC();
  dbSave(dateStr,selDocId,selClinicId,'');
}

function updateMultiSelBar(){
  var bar=document.getElementById('multiSelBar');
  if(!bar)return;
  if(isDragging&&multiSelDates.size>0){
    bar.style.display='flex';
    document.getElementById('multiSelCount').textContent=
      multiSelDates.size+'日を入力中'+(selClinicId?' ('+cname(selClinicId)+')':'');
  } else {
    bar.style.display='none';
  }
}

function renderCalGrid(){
  if(!selDocId)return;
  var days=dim(curY,curM),firstDow=new Date(curY,curM,1).getDay();
  var h='';
  for(var i=0;i<firstDow;i++)h+='<div class="day-cell empty"></div>';
  for(var d=1;d<=days;d++){
    var dateStr=ds(d),w=dow(d);
    var sh=(shifts[dateStr]||[]).find(function(s){return s.docId===selDocId;});
    var cls=w===0?'sun':w===6?'sat':'';
    /* 祝日のみ薄くする（日曜は通常通り入力可） */
    var isHol=HOL.has(dateStr)&&!isToday(d)&&dow(d)!==0;
    if(isHol)cls+=' closed-day';
    if(isToday(d))cls+=' today-day';
    if(multiSelDates.has(dateStr))cls+=' multi-sel';
    if(!sh&&selClinicId&&!isHol)cls+=' sel-clinic';
    h+='<div class="day-cell '+cls+'" data-date="'+dateStr+'">';
    h+='<span class="day-num">'+d+'</span>';
    if(sh){
      var c=getCC(sh.clinicId);
      var isKyu=sh.memo==='休出';
      var border=isKyu?'border:2px solid #e67e22;':'';
      h+='<span class="day-shift" data-del-date="'+dateStr+'" style="background:'+c.b+';color:'+c.c+';'+border+';cursor:pointer;">'+cname(sh.clinicId)+'</span>';
      if(sh.memo==='代出')h+='<span style="display:block;font-size:7px;color:#999;">代出</span>';
      if(isKyu)h+='<span style="display:block;font-size:7px;color:#e67e22;font-weight:700;">休出</span>';
    }
    h+='</div>';
  }
  document.getElementById('calGrid').innerHTML=h;
}

/* ===== 医院カレンダー ===== */
var clinicCalId=null, clinicCalY=2026, clinicCalM=0;
function openClinicCal(clinicId){
  clinicCalId=clinicId;
  clinicCalY=curY; clinicCalM=curM;
  updateClinicCalTitle();
  renderClinicCal();
  document.getElementById('clinicCalOv').classList.add('on');
}
function updateClinicCalTitle(){
  var cl=CLINICS.find(function(c){return c.id===clinicCalId;});
  var col=getCC(clinicCalId).c;
  document.getElementById('clinicCalTitle').textContent=(cl?cl.n:'')+'｜'+clinicCalY+'年'+(clinicCalM+1)+'月';
  document.getElementById('clinicCalTitle').style.color=col;
}
function chgClinicCalMonth(dir){
  clinicCalM+=dir;
  if(clinicCalM>11){clinicCalM=0;clinicCalY++;}
  if(clinicCalM<0){clinicCalM=11;clinicCalY--;}
  updateClinicCalTitle();
  renderClinicCal();
}
function renderClinicCal(){
  if(!clinicCalId)return;
  var days=dim(clinicCalY,clinicCalM),firstDow=new Date(clinicCalY,clinicCalM,1).getDay();
  var col=getCC(clinicCalId).c, colB=getCC(clinicCalId).b;
  var DOWS=['日','月','火','水','木','金','土'];
  var DOWCOL=['#e05252','var(--ink2)','var(--ink2)','var(--ink2)','var(--ink2)','var(--ink2)','#4a7fd4'];

  // 曜日ヘッダー + 日付を1グリッドに統合
  var dowHdr='';
  DOWS.forEach(function(d,i){
    dowHdr+='<div style="text-align:center;font-size:10px;font-weight:700;color:'+DOWCOL[i]+';padding:3px 0;letter-spacing:.04em;">'+d+'</div>';
  });
  var h='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">'+dowHdr;
  for(var i=0;i<firstDow;i++) h+='<div></div>';

  for(var d=1;d<=days;d++){
    var dateStr=clinicCalY+'-'+String(clinicCalM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var w=new Date(clinicCalY,clinicCalM,d).getDay();
    var dayS=(shifts[dateStr]||[]).filter(function(s){return s.clinicId===clinicCalId;});
    var closed=isClosed(dateStr,clinicCalId)&&!todayFlagOf(clinicCalY,clinicCalM,d);
    var isT=todayFlagOf(clinicCalY,clinicCalM,d);
    var isSun=w===0,isSat=w===6;

    var bg=closed?'#f5f4f0':isT?colB:isSun?'#fff5f5':isSat?'#f0f5ff':'#fff';
    var numCol=isSun?'#e05252':isSat?'#4a7fd4':'var(--ink3)';
    var border=isT?'2px solid '+col:'1px solid rgba(0,0,0,.06)';

    h+='<div style="background:'+bg+';border-radius:8px;border:'+border+';padding:4px 3px;min-height:56px;display:flex;flex-direction:column;">';
    // 日付数字
    h+='<div style="font-size:11px;font-weight:700;color:'+(isT?col:numCol)+';text-align:center;line-height:1;margin-bottom:2px;">'+d+'</div>';

    if(closed){
      h+='<div style="flex:1;display:flex;align-items:center;justify-content:center;"><span style="font-size:8px;color:var(--ink3);letter-spacing:.02em;">休診</span></div>';
    } else if(dayS.length){
      // 人数バッジ
      h+='<div style="text-align:center;margin-bottom:3px;"><span style="background:'+col+';color:#fff;font-size:9px;font-weight:800;border-radius:8px;padding:1px 6px;white-space:nowrap;letter-spacing:.01em;">'+dayS.length+'名</span></div>';
      // ドクター名
      h+='<div style="flex:1;">';
      dayS.forEach(function(s){
        var doc=doctors.find(function(dd){return dd.id===s.docId;});
        if(!doc)return;
        var tag=s.memo==='休出'?'<span style="color:#e67e22;font-size:5px;vertical-align:middle;">●</span>':
                s.memo==='代出'?'<span style="color:#999;font-size:5px;vertical-align:middle;">●</span>':'';
        h+='<div style="font-size:8px;font-weight:600;color:var(--ink);text-align:center;line-height:1.5;">'+doc.n+tag+'</div>';
      });
      h+='</div>';
    } else {
      h+='<div style="flex:1;"></div>';
    }
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('clinicCalGrid').innerHTML=h;
}

function todayFlagOf(y,m,d){
  return today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
}


/* ===== 個人カレンダー ===== */
var docCalDocId=null, docCalY=2026, docCalM=0;
function openDocCal(docId){
  docCalDocId=docId;
  docCalY=curY; docCalM=curM;
  updateDocCalTitle();
  renderDocCal();
  document.getElementById('docCalOv').classList.add('on');
}
function updateDocCalTitle(){
  var doc=doctors.find(function(d){return d.id===docCalDocId;});
  document.getElementById('docCalTitle').textContent=(doc?doc.n:'')+'の'+docCalY+'年'+(docCalM+1)+'月';
}
function chgDocCalMonth(dir){
  docCalM+=dir;
  if(docCalM>11){docCalM=0;docCalY++;}
  if(docCalM<0){docCalM=11;docCalY--;}
  updateDocCalTitle();
  renderDocCal();
}
function renderDocCal(){
  if(!docCalDocId)return;
  var days=dim(docCalY,docCalM),firstDow=new Date(docCalY,docCalM,1).getDay();
  var restIds=new Set(['yasumi','yukyu','daikyu','daishutsu']);
  var DOWS=['日','月','火','水','木','金','土'];
  var DOWCOL=['#e05252','#444','#444','#444','#444','#444','#4a7fd4'];

  /* 全部を1グリッドに：曜日7個 + 空白(firstDow個) + 日付セル */
  var cells='';

  /* 曜日ヘッダー */
  DOWS.forEach(function(d,i){
    cells+='<div style="text-align:center;font-size:11px;font-weight:700;color:'+DOWCOL[i]+';padding:4px 0;border-bottom:1px solid var(--border);">'+d+'</div>';
  });

  /* 空白（月初の曜日分） */
  for(var i=0;i<firstDow;i++){
    cells+='<div></div>';
  }

  /* 日付セル */
  for(var d=1;d<=days;d++){
    var dateStr=docCalY+'-'+String(docCalM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var w=new Date(docCalY,docCalM,d).getDay();
    var sh=(shifts[dateStr]||[]).find(function(s){return s.docId===docCalDocId;});
    var isT=todayFlagOf(docCalY,docCalM,d);
    var isSun=w===0,isSat=w===6;
    var c2=sh?getCC(sh.clinicId):null;
    var bg=isT&&c2?c2.b:isSun?'#fff5f5':isSat?'#f0f5ff':'#fff';
    var numCol=isSun?'#e05252':isSat?'#4a7fd4':'var(--ink3)';
    var border=isT?'2px solid '+(c2?c2.c:'var(--ink)'):'1px solid rgba(0,0,0,.06)';

    cells+='<div style="background:'+bg+';border-radius:8px;border:'+border+';padding:4px 3px;min-height:64px;display:flex;flex-direction:column;">';
    cells+='<div style="font-size:12px;font-weight:700;color:'+(isT&&c2?c2.c:numCol)+';text-align:center;line-height:1;margin-bottom:3px;">'+d+'</div>';

    if(sh){
      var isKyu=sh.memo==='休出',isDai=sh.memo==='代出';
      cells+='<div style="text-align:center;margin-bottom:2px;">';
      cells+='<span style="display:inline-block;background:'+c2.c+';color:#fff;font-size:10px;font-weight:800;border-radius:6px;padding:2px 6px;white-space:nowrap;">'+cname(sh.clinicId)+'</span>';
      cells+='</div>';
      if(isDai)cells+='<div style="text-align:center;font-size:8px;color:#999;font-weight:600;">代出</div>';
      if(isKyu)cells+='<div style="text-align:center;font-size:8px;color:#e67e22;font-weight:700;">休出</div>';
      if(!restIds.has(sh.clinicId)){
        var mates=(shifts[dateStr]||[]).filter(function(s){return s.docId!==docCalDocId&&s.clinicId===sh.clinicId;})
          .map(function(s){var d2=doctors.find(function(dd){return dd.id===s.docId;});return d2?d2.n:'';}).filter(Boolean);
        if(mates.length){
          cells+='<div style="display:flex;flex-wrap:wrap;gap:1px;justify-content:center;margin-top:auto;">';
          mates.forEach(function(name){
            cells+='<span style="background:'+c2.b+';color:'+c2.c+';font-size:8px;font-weight:700;padding:1px 4px;border-radius:4px;line-height:1.5;">'+name+'</span>';
          });
          cells+='</div>';
        }
      }
    }
    cells+='</div>';
  }

  document.getElementById('docCalGrid').innerHTML=
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">'+cells+'</div>';
}


function openQpop(dateStr){
  if(!isAdmin||!selDocId)return;
  qpopDate=dateStr;showAllClinics=false;
  var doc=doctors.find(function(d){return d.id===selDocId;});
  var parts=dateStr.split('-'),w=new Date(dateStr).getDay();
  document.getElementById('qpopTitle').textContent=doc?doc.n:'';
  document.getElementById('qpopSub').textContent=parseInt(parts[1])+'月'+parseInt(parts[2])+'日（'+DOW[w]+'）';
  var current=(shifts[dateStr]||[]).find(function(s){return s.docId===selDocId;});
  /* よく行く医院グリッド */
  var freq=FREQ_MAP[selDocId]||[];
  var freqSecLbl=document.getElementById('freqSecLbl');
  var freqGrid=document.getElementById('freqGrid');
  if(freq.length){
    freqSecLbl.style.display='';
    freqGrid.style.display='';
    freqGrid.innerHTML=freq.map(function(cid){
      var c=getCC(cid),on=current&&current.clinicId===cid;
      return '<button class="clinic-btn'+(on?' cur':'')+'" data-cid="'+cid+'" style="background:'+c.b+';color:'+c.c+(on?';border-color:'+c.c:'')+'">'+cname(cid)+'</button>';
    }).join('');
  }else{
    freqSecLbl.style.display='none';freqGrid.style.display='none';
  }
  /* 全医院グリッド（初期非表示） */
  document.getElementById('allGrid').innerHTML=CLINICS.map(function(cl){
    var cc=getCC(cl.id),on=current&&current.clinicId===cl.id;
    return '<button class="clinic-btn'+(on?' cur':'')+'" data-cid="'+cl.id+'" style="background:'+cc.b+';color:'+cc.c+(on?';border-color:'+cc.c:'')+'">'+cl.n+'</button>';
  }).join('');
  document.getElementById('allGrid').style.display='none';
  document.getElementById('moreBtn').textContent='すべての医院を表示 ▾';
  /* 休み */
  document.getElementById('restGrid').innerHTML=STATUSES.map(function(s){
    var on=current&&current.clinicId===s.id;
    return '<button class="rest-btn'+(on?' on':'')+'" data-sid="'+s.id+'">'+s.n+'</button>';
  }).join('');
  document.getElementById('qDelBtn').style.display=current?'':'none';
  var chk2=document.getElementById('daishutsuChk');
  if(chk2)chk2.checked=current&&current.memo==='代出';
  document.getElementById('qpopOv').classList.add('on');
}
function closeQpop(){document.getElementById('qpopOv').classList.remove('on');qpopDate=null;}
async function quickSave(dateStrArg, docIdArg, cid){
  var targetDate=dateStrArg||qpopDate;
  var targetDoc=docIdArg||selDocId;
  if(!targetDate||!targetDoc||!cid)return;
  var chk=document.getElementById('daishutsuChk');
  var memo=(chk&&chk.checked)?'代出':'';
  if(!shifts[targetDate])shifts[targetDate]=[];
  var idx=shifts[targetDate].findIndex(function(s){return s.docId===targetDoc;});
  var e={docId:targetDoc,clinicId:cid,memo:memo};
  if(idx>=0)shifts[targetDate][idx]=e;else shifts[targetDate].push(e);
  if(qpopDate)closeQpop();
  renderP();renderA();renderC();
  await dbSave(targetDate,targetDoc,cid,memo);
}
async function quickDel(){
  if(!qpopDate||!selDocId)return;
  if(shifts[qpopDate]){
    shifts[qpopDate]=shifts[qpopDate].filter(function(s){return s.docId!==selDocId;});
    if(!shifts[qpopDate].length)delete shifts[qpopDate];
  }
  closeQpop();renderB();renderA();renderC();
  await dbDel(qpopDate,selDocId);
}

/* 取得履歴モーダル */
function openYukyuHist(docId){
  var doc=doctors.find(function(d){return d.id===docId;});
  var yd=YUKYU_DATA[docId]||{history:[]};
  var hist=yd.history||[];
  
  document.getElementById('histTitle').textContent=(doc?doc.n:'')+'の有休取得履歴';
  
  var h='';
  if(!hist.length){
    h='<p style="color:var(--ink3);font-size:13px;padding:20px 0;text-align:center;">履歴がありません</p>';
  } else {
    // 年ごとにグループ化
    var byYear={};
    hist.forEach(function(d){
      var y=d.slice(0,4);
      if(!byYear[y])byYear[y]=[];
      byYear[y].push(d);
    });
    Object.keys(byYear).sort().reverse().forEach(function(y){
      h+='<div style="margin-bottom:14px;">';
      h+='<div style="font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:8px;">'+y+'年（'+byYear[y].length+'日）</div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:5px;">';
      byYear[y].forEach(function(d){
        var dt=new Date(d);
        var m=dt.getMonth()+1,day=dt.getDate();
        var DOW2=['日','月','火','水','木','金','土'];
        h+='<span style="padding:4px 9px;background:#fdf0ee;color:#c0392b;border-radius:6px;font-size:11px;font-weight:600;">'+m+'/'+day+'（'+DOW2[dt.getDay()]+'）</span>';
      });
      h+='</div></div>';
    });
  }
  
  // 新規追加フォーム
  h+='<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:8px;">日付を追加</div>';
  h+='<div style="display:flex;gap:8px;">';
  h+='<input type="date" id="histNewDate" style="flex:1;padding:9px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;background:var(--bg);">';
  h+='<button id="histAddBtn" data-doc-id="'+docId+'" style="padding:9px 16px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:13px;cursor:pointer;">追加</button>';
  h+='</div></div>';
  
  document.getElementById('histBody').innerHTML=h;
  
  document.getElementById('histAddBtn').addEventListener('click',function(){
    var d=document.getElementById('histNewDate').value;
    if(!d)return;
    if(!YUKYU_DATA[docId])YUKYU_DATA[docId]={remaining:0,history:[]};
    if(!YUKYU_DATA[docId].history)YUKYU_DATA[docId].history=[];
    if(!YUKYU_DATA[docId].history.includes(d)){
      YUKYU_DATA[docId].history.push(d);
      YUKYU_DATA[docId].history.sort();
    }
    openYukyuHist(docId);
    renderD();
  });
  
  document.getElementById('histOv').classList.add('on');
}

/* ---- バックアップ機能 ---- */
function saveBackup(){
  try{
    var now=new Date();
    var label=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' '+
      String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    var entry={ts:now.getTime(),label:label,data:JSON.stringify(shifts)};
    var list=JSON.parse(localStorage.getItem('seishokai_backups')||'[]');
    list.unshift(entry);
    if(list.length>5)list=list.slice(0,5);
    localStorage.setItem('seishokai_backups',JSON.stringify(list));
    showSb('バックアップ保存（'+label+'）','ok');
    renderBackupList();
  }catch(e){showSb('バックアップ失敗','e');}
}
function renderBackupList(){
  var el=document.getElementById('backupList');
  if(!el)return;
  try{
    var list=JSON.parse(localStorage.getItem('seishokai_backups')||'[]');
    if(!list.length){el.innerHTML='<p style="font-size:12px;color:var(--ink3);text-align:center;padding:16px 0;">バックアップなし</p>';return;}
    el.innerHTML=list.map(function(entry,i){
      return '<div style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:10px;margin-bottom:6px;">'+
        '<div style="flex:1;"><div style="font-size:13px;font-weight:600;">'+entry.label+'</div>'+
        '<div style="font-size:10px;color:var(--ink3);margin-top:2px;">'+
          Object.keys(JSON.parse(entry.data)).length+'日分のデータ</div></div>'+
        '<button data-backup-idx="'+i+'" style="padding:6px 12px;background:#fdf0ee;color:#b83030;border:none;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer;">復元</button>'+
        '</div>';
    }).join('');
    /* 復元ボタン */
    el.querySelectorAll('[data-backup-idx]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var idx=parseInt(btn.dataset.backupIdx);
        if(!confirm(list[idx].label+'のデータに復元しますか？'))return;
        try{
          shifts=JSON.parse(list[idx].data);
          showSb('復元しました','ok');
          renderAll();
          document.getElementById('setOv').classList.remove('on');
        }catch(e){showSb('復元失敗','e');}
      });
    });
  }catch(e){el.innerHTML='<p style="font-size:12px;color:#b83030;">読み込みエラー</p>';}
}

/* 自動バックアップ（毎日9時） */
function scheduleAutoBackup(){
  var now=new Date();
  var next=new Date(now);
  next.setHours(9,0,0,0);
  if(next<=now)next.setDate(next.getDate()+1);
  var ms=next-now;
  setTimeout(function(){
    saveBackup();
    setInterval(saveBackup,24*60*60*1000);
  },ms);
}

  }
  h+='</tr></thead><tbody>';
  CLINICS.forEach(function(cl){
    var col=getCC(cl.id).c;
    h+='<tr><td class="c-fix" style="background:var(--card);text-align:left;padding-left:8px;font-size:11px;font-weight:600;color:'+col+'">'+cl.n+'</td>';
    for(var d=1;d<=days;d++){
      var dateStr=ds(d),w=dow(d);
      var dayS=(shifts[dateStr]||[]).filter(function(s){return s.clinicId===cl.id;});
      var cls=w===0?'sun':w===6?'sat':'';
      var closed=isClosed(dateStr,cl.id)&&!isToday(d);
      if(closed)h+='<td class="'+cls+'" style="background:#f0efed;color:var(--ink3);text-align:center;font-size:10px;">—</td>';
      else if(!dayS.length)h+='<td class="'+cls+'"></td>';
      else{
        var names=dayS.map(function(s){var doc=doctors.find(function(dd){return dd.id===s.docId;});return doc?doc.n:'';}).join(' ');
        h+='<td class="'+cls+'"><span class="cnum" style="color:'+col+'">'+dayS.length+'</span><span class="cnames">'+names+'</span></td>';
      }
    }
    h+='</tr>';
  });
  el.innerHTML=h+'</tbody>';
}

/* ---- SETTINGS ---- */
let sClinics=[];
function openSettings(){
  sDoctors=doctors.map(function(d){return Object.assign({},d);});
  sClinics=CLINICS.map(function(c){return Object.assign({},c);});
  sSwitchTab(0);document.getElementById('setOv').classList.add('on');
}
function sSwitchTab(n){
  [0,1,2,3,4,5].forEach(function(i){
    var c=document.getElementById('sc'+i),b=document.getElementById('st'+i);
    if(c)c.style.display=i===n?'':'none';if(b)b.classList.toggle('on',i===n);
  });
  if(n===0)renderRankList();
  if(n===1)renderDocEdit();
  if(n===2)renderClinicEdit();
  if(n===3)renderClosedGrid();
  if(n===5)renderBackupList();
}
function renderRankList(){
  document.getElementById('sc0').innerHTML=sDoctors.map(function(d,i){
    return '<div class="rank-row"><span style="flex:1;font-size:13px;">'+d.n+'</span>'+
      ['A','B','C'].map(function(r){
        var on=d.r===r,bg=on?(r==='A'?'#7b2d8b':r==='B'?'#1a5276':'#2e7d32'):'var(--border)';
        return '<button data-idx="'+i+'" data-rank="'+r+'" style="width:34px;height:30px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:'+bg+';color:'+(on?'#fff':'var(--ink3)')+'">'+r+'</button>';
      }).join('')+'</div>';
  }).join('');
}
function renderDocEdit(){
  document.getElementById('sc1').innerHTML=sDoctors.map(function(d,i){
    return '<div style="margin-bottom:10px;padding:10px;background:var(--bg);border-radius:10px;">'+
      '<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">'+
      '<input value="'+d.n+'" data-idx="'+i+'" class="doc-name-input" style="flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--card);">'+
      '<select data-idx="'+i+'" class="doc-rank-sel" style="padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;background:var(--card);">'+
      ['A','B','C'].map(function(r){return '<option'+(d.r===r?' selected':'')+'>'+r+'</option>';}).join('')+
      '</select>'+
      '<button data-idx="'+i+'" class="rm-doc-btn" style="width:32px;height:34px;border:none;border-radius:8px;background:#fdf0ee;color:#b83030;font-size:15px;cursor:pointer;">×</button></div>'+
      '<input value="'+(d.memo||'')+'" data-idx="'+i+'" placeholder="時短など（例：17時まで）" class="doc-memo-input" style="width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:11px;background:var(--card);color:var(--ink2);">'+
      '</div>';
  }).join('')+'<button id="addDocBtn" style="width:100%;padding:11px;border:1px dashed var(--border);border-radius:10px;background:var(--bg);color:var(--ink2);font-family:inherit;font-size:13px;cursor:pointer;">＋ ドクターを追加</button>';
}
function renderClosedGrid(){
  var DOWS=['日','月','火','水','木','金','土'];
  var h='<table style="border-collapse:collapse;width:100%;font-size:12px;"><tr><th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)">医院</th>';
  DOWS.forEach(function(d){h+='<th style="padding:5px 3px;border-bottom:1px solid var(--border);text-align:center;min-width:30px">'+d+'</th>';});
  h+='</tr>';
  CLINICS.filter(function(c){return c.id!=='houmon';}).forEach(function(c){
    h+='<tr><td style="padding:6px 8px;border-bottom:1px solid var(--border);font-weight:500">'+c.n+'</td>';
    DOWS.forEach(function(_,i){
      h+='<td style="text-align:center;border-bottom:1px solid var(--border)"><input type="checkbox"'+(((CLOSED[c.id]||[]).includes(i))?'checked':'')+' data-cid="'+c.id+'" data-dow="'+i+'" class="closed-chk" style="width:18px;height:18px;cursor:pointer"></td>';
    });
    h+='</tr>';
  });
  document.getElementById('sc2').innerHTML=h+'</table>';
}
function renderClinicEdit(){
  var sClinicHTML = sClinics.map(function(c,i){
    return '<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">'+
      '<div style="width:12px;height:12px;border-radius:50%;background:var(--c-'+c.id+',#888);flex-shrink:0;"></div>'+
      '<input value="'+c.n+'" data-cidx="'+i+'" class="clinic-name-input" style="flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);">'+
      '<button data-cidx="'+i+'" class="rm-clinic-btn" style="width:32px;height:34px;border:none;border-radius:8px;background:#fdf0ee;color:#b83030;font-size:15px;cursor:pointer;">×</button></div>';
  }).join('');
  document.getElementById('sc2').innerHTML = sClinicHTML +
    '<button id="addClinicBtn" style="width:100%;padding:11px;border:1px dashed var(--border);border-radius:10px;background:var(--bg);color:var(--ink2);font-family:inherit;font-size:13px;cursor:pointer;margin-top:4px;">＋ 医院を追加</button>';
}

function saveSettings(){
  doctors=sDoctors.map(function(d){return Object.assign({},d);});
  CLINICS=sClinics.map(function(c){return Object.assign({},c);});
  Object.keys(ccache).forEach(function(k){delete ccache[k];});
  document.getElementById('setOv').classList.remove('on');
  showSb('反映しました','ok');renderAll();
}

/* ---- RENDER ALL ---- */
function renderAll(){
  var lbl=curY+'年'+(curM+1)+'月';
  ['mLbl','mLblB','mLblC','mLblD','mLblAdmin'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.textContent=lbl;
  });
  renderLegend();
  if(curTab===0)renderP();
  else if(curTab===1)renderA();
  else if(curTab===2)renderC();
  else if(curTab===3)renderD();
}

/* ---- EVENTS ---- */
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('prevBtn').addEventListener('click',function(){chgMonth(-1);});
  document.getElementById('thisMonthBtn').addEventListener('click',function(){
    curY=today.getFullYear();curM=today.getMonth();
    renderAll();
    /* 今日のセルにスクロール */
    setTimeout(function(){
      var cell=document.querySelector('.today-day,.today-c');
      if(cell)cell.scrollIntoView({behavior:'smooth',block:'center'});
    },200);
  });
  document.getElementById('nextBtn').addEventListener('click',function(){chgMonth(1);});
  document.getElementById('authBtn').addEventListener('click',doAuthToggle);
  document.getElementById('setBtn').addEventListener('click',openSettings);
  [0,1,2,3].forEach(function(i){
    var t=document.getElementById('tab'+i);if(t)t.addEventListener('click',function(){setTab(i);});
    var ht=document.getElementById('htab'+i);if(ht)ht.addEventListener('click',function(){setTab(i);});
  });
  document.getElementById('loginBtn').addEventListener('click',doLogin);
  document.getElementById('authCancelBtn').addEventListener('click',function(){document.getElementById('authOv').classList.remove('on');});
  document.getElementById('authOv').addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});
  document.getElementById('authPw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('setCloseBtn').addEventListener('click',function(){document.getElementById('setOv').classList.remove('on');});
  document.getElementById('setOv').addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});
  document.getElementById('setConfirmBtn').addEventListener('click',saveSettings);
  var uploadBtn=document.getElementById('uploadBtn');if(uploadBtn)uploadBtn.addEventListener('click',doUpload);
  [0,1,2,3,4,5].forEach(function(i){var btn=document.getElementById('st'+i);if(btn)btn.addEventListener('click',function(){sSwitchTab(i);});});
  /* 解除ボタン */
  /* 医院選択バーのクリック（clinicPickRowに直接設定） */
  document.getElementById('clinicPickRow').addEventListener('click',function(e){
    /* buttonまたはその子要素がクリックされた場合に対応 */
    var btn=e.target;
    while(btn&&btn!==this){
      if(btn.getAttribute&&btn.getAttribute('data-cid')){break;}
      btn=btn.parentNode;
    }
    if(!btn||!btn.getAttribute)return;
    var cid=btn.getAttribute('data-cid');
    if(!cid)return;
    selClinicId=(selClinicId===cid)?null:cid;
    renderClinicPickBar();
    renderCalGrid();
    updateMultiSelBar();
  });

  document.getElementById('multiSelClear').addEventListener('click',function(){
    multiSelDates.clear();isDragging=false;updateMultiSelBar();renderCalGrid();
  });

  /* ===== PC マウスドラッグ選択 ===== */
  var calGridEl=document.getElementById('calGrid');
  var mouseMovedAfterDown=false;
  calGridEl.addEventListener('mousedown',function(ev){
    if(!isAdmin||!selDocId||!selClinicId)return;
    if(ev.target.closest('.clinic-pick-btn'))return;
    var cell=ev.target.closest('.day-cell');
    if(!cell||!cell.dataset.date)return;
    mouseMovedAfterDown=false;
    isDragging=false; /* まだドラッグ開始しない */
  });
  calGridEl.addEventListener('mousemove',function(ev){
    if(!isAdmin||!selDocId||!selClinicId)return;
    if(!(ev.buttons&1))return; /* 左ボタン押下中のみ */
    var cell=ev.target.closest('.day-cell');
    if(!cell||!cell.dataset.date)return;
    if(!mouseMovedAfterDown){
      mouseMovedAfterDown=true;
      isDragging=true;
    }
    saveToDate(cell.dataset.date);
  });
  document.addEventListener('mouseup',function(){
    if(isDragging){
      isDragging=false;
      var cnt=multiSelDates.size;
      multiSelDates.clear();
      updateMultiSelBar();
      if(cnt>1)showSb(cnt+'日を保存','ok');
    }
  });

  /* ===== スマホ タッチスライド選択 ===== */
  calGridEl.addEventListener('touchstart',function(ev){
    if(!isAdmin||!selDocId||!selClinicId)return;
    var cell=ev.target.closest('.day-cell');
    if(!cell||!cell.dataset.date)return;
    isDragging=true;
    navigator.vibrate&&navigator.vibrate(15);
    saveToDate(cell.dataset.date);
  },{passive:true});
  calGridEl.addEventListener('touchmove',function(ev){
    if(!isDragging)return;
    var t=ev.touches[0];
    var el2=document.elementFromPoint(t.clientX,t.clientY);
    var cell2=el2&&el2.closest&&el2.closest('.day-cell');
    if(cell2&&cell2.dataset.date){
      saveToDate(cell2.dataset.date);
    }
  },{passive:true});
  calGridEl.addEventListener('touchend',function(){
    if(isDragging){
      isDragging=false;
      var cnt=multiSelDates.size;
      multiSelDates.clear();
      updateMultiSelBar();
      if(cnt>1)showSb(cnt+'日を保存','ok');
    }
  },{passive:true});

  document.getElementById('qCancelBtn').addEventListener('click',closeQpop);
  document.getElementById('docCalPrev').addEventListener('click',function(){chgDocCalMonth(-1);});
  document.getElementById('docCalNext').addEventListener('click',function(){chgDocCalMonth(1);});
  document.getElementById('clinicCalPrev').addEventListener('click',function(){chgClinicCalMonth(-1);});
  document.getElementById('clinicCalNext').addEventListener('click',function(){chgClinicCalMonth(1);});
  document.getElementById('histCloseBtn').addEventListener('click',function(){document.getElementById('histOv').classList.remove('on');});
  document.getElementById('histOv').addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});
  document.getElementById('clinicCalCloseBtn').addEventListener('click',function(){document.getElementById('clinicCalOv').classList.remove('on');});
  document.getElementById('clinicCalOv').addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});
  document.getElementById('docCalCloseBtn').addEventListener('click',function(){document.getElementById('docCalOv').classList.remove('on');});
  document.getElementById('docCalOv').addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});
  document.getElementById('qDelBtn').addEventListener('click',quickDel);
  document.getElementById('qpopOv').addEventListener('click',function(e){if(e.target===this)closeQpop();});
  document.getElementById('moreBtn').addEventListener('click',function(){
    showAllClinics=!showAllClinics;
    document.getElementById('allGrid').style.display=showAllClinics?'':'none';
    this.textContent=showAllClinics?'閉じる ▴':'すべての医院を表示 ▾';
  });

  /* EVENT DELEGATION */
  document.addEventListener('click',function(e){
    /* ドクター選択 */
    var chipEl=e.target.closest('.doc-sel-chip');
    if(chipEl&&chipEl.dataset.did){
      selDocId=chipEl.dataset.did===selDocId?null:chipEl.dataset.did;
      renderP();return;
    }
    /* 医院選択バー - clinicPickRowに直接設定済みのため不要 */
    /* よく行く医院（freqBar からワンタップ保存） */
    if(e.target.classList.contains('freq-pill')&&e.target.dataset.cid&&qpopDate===null){
      /* freqBarのpillをタップ→選択中の日がなければ何もしない（カレンダーからのみ） */
      return;
    }
    /* カレンダーのシフトバッジをタップ→削除 */
    if(e.target.dataset.delDate){
      var delDate=e.target.dataset.delDate;
      if(shifts[delDate]){
        shifts[delDate]=shifts[delDate].filter(function(s){return s.docId!==selDocId;});
        if(!shifts[delDate].length)delete shifts[delDate];
      }
      renderCalGrid();renderAllView('allViewWrap');renderA();renderC();
      dbDel(delDate,selDocId);
      return;
    }
    /* カレンダーのシフトバッジをタップ→削除（医院未選択時のみ） */
    if(e.target.dataset.delDate&&selDocId&&!selClinicId){
      var delDate=e.target.dataset.delDate;
      if(shifts[delDate]){
        shifts[delDate]=shifts[delDate].filter(function(s){return s.docId!==selDocId;});
        if(!shifts[delDate].length)delete shifts[delDate];
      }
      renderCalGrid();renderAllView('allViewWrap');renderA();renderC();
      dbDel(delDate,selDocId);
      return;
    }
    /* カレンダーの日付タップ */
    if(e.target.closest('.day-cell')){
      var cell=e.target.closest('.day-cell');
      if(cell.classList.contains('empty'))return;
      if(!isAdmin||!selDocId||!cell.dataset.date)return;
      if(isDragging)return; /* ドラッグ中はclickをスキップ */
      var dateStr2=cell.dataset.date;
      if(selClinicId){
        /* 医院選択済み：即保存 */
        if(!shifts[dateStr2])shifts[dateStr2]=[];
        var existIdx=shifts[dateStr2].findIndex(function(s){return s.docId===selDocId;});
        var newEntry={docId:selDocId,clinicId:selClinicId,memo:''};
        if(existIdx>=0)shifts[dateStr2][existIdx]=newEntry;else shifts[dateStr2].push(newEntry);
        renderCalGrid();renderAllView('allViewWrap');renderA();renderC();
        dbSave(dateStr2,selDocId,selClinicId,'');
        showSb('保存','ok');
      } else {
        openQpop(dateStr2);
      }
      return;
    }
    /* Qpopの医院ボタン */
    if(e.target.classList.contains('clinic-btn')&&e.target.dataset.cid){
      quickSave(null,null,e.target.dataset.cid);return;
    }
    /* Qpopの休みボタン */
    if(e.target.classList.contains('rest-btn')&&e.target.dataset.sid){
      quickSave(null,null,e.target.dataset.sid);return;
    }
    /* Settings: ランクボタン */
    if(e.target.dataset.rank&&e.target.dataset.idx!==undefined){
      sDoctors[parseInt(e.target.dataset.idx)].r=e.target.dataset.rank;renderRankList();return;
    }
    /* Settings: ドクター削除 */
    if(e.target.classList.contains('rm-doc-btn')&&e.target.dataset.idx!==undefined){
      var idx=parseInt(e.target.dataset.idx);
      if(!confirm(sDoctors[idx].n+' を削除?'))return;
      sDoctors.splice(idx,1);renderDocEdit();renderRankList();return;
    }
    /* 医院名タップ→月カレンダー */
    if(e.target.dataset.openClinic){
      openClinicCal(e.target.dataset.openClinic);return;
    }
    /* Settings: ドクター追加 */
    if(e.target.id==='addDocBtn'){
      sDoctors.push({id:'d'+Date.now(),n:'新ドクター',r:'C',memo:''});renderDocEdit();renderRankList();return;
    }
    /* Settings: 医院追加 */
    if(e.target.id==='addClinicBtn'){
      var newId='c'+Date.now();
      sClinics.push({id:newId,n:'新医院',cc:'cc-chiryu'});renderClinicEdit();return;
    }
    /* Settings: 医院削除 */
    if(e.target.classList.contains('rm-clinic-btn')&&e.target.dataset.cidx!==undefined){
      var cidx=parseInt(e.target.dataset.cidx);
      if(!confirm(sClinics[cidx].n+' を削除?'))return;
      sClinics.splice(cidx,1);renderClinicEdit();return;
    }
  });

  document.addEventListener('input',function(e){
    if(e.target.classList.contains('doc-name-input'))sDoctors[parseInt(e.target.dataset.idx)].n=e.target.value;
    if(e.target.classList.contains('doc-rank-sel'))sDoctors[parseInt(e.target.dataset.idx)].r=e.target.value;
    if(e.target.classList.contains('doc-memo-input'))sDoctors[parseInt(e.target.dataset.idx)].memo=e.target.value;
    if(e.target.classList.contains('clinic-name-input'))sClinics[parseInt(e.target.dataset.cidx)].n=e.target.value;
    if(e.target.classList.contains('closed-chk')){
      var cid=e.target.dataset.cid,d=parseInt(e.target.dataset.dow);
      if(!CLOSED[cid])CLOSED[cid]=[];
      if(e.target.checked){if(!CLOSED[cid].includes(d))CLOSED[cid].push(d);}
      else CLOSED[cid]=CLOSED[cid].filter(function(x){return x!==d;});
    }
  });

  /* バックアップボタン */
  var bsBtn=document.getElementById('backupSaveBtn');
  if(bsBtn)bsBtn.addEventListener('click',saveBackup);

  /* 印刷ボタン */
  document.getElementById('printBtn').addEventListener('click',function(){
    document.getElementById('printOv').classList.add('on');
  });
  document.getElementById('printCancelBtn').addEventListener('click',function(){
    document.getElementById('printOv').classList.remove('on');
  });
  document.getElementById('printOv').addEventListener('click',function(e){
    if(e.target===this)this.classList.remove('on');
  });
  document.querySelectorAll('.print-sel-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.getElementById('printOv').classList.remove('on');
      var type=btn.dataset.print;
      executePrint(type);
    });
  });

  /* 全体バランストグル */
  var bRightTitle=document.getElementById('bRightTitle');
  if(bRightTitle){
    bRightTitle.addEventListener('click',function(){
      var wrap=document.getElementById('allViewWrap');
      var tog=document.getElementById('bRightToggle');
      var panel=document.getElementById('bRightPanel');
      if(wrap.style.display==='none'){
        wrap.style.display='';
        tog.textContent='▼ 表示';
        panel.style.minWidth='';
      } else {
        wrap.style.display='none';
        tog.textContent='▶ 非表示';
        panel.style.minWidth='0';
        panel.style.flex='0 0 auto';
      }
    });
  }

  shifts={};Object.assign(shifts,EXCEL_DATA);
  /* htab初期化 */
  var htab0=document.getElementById('htab0');
  if(htab0)htab0.classList.add('on');
  renderAll();
  loadDB().then(function(){renderAll();scheduleAutoBackup();});
});
</script>
</body>
</html>
