<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>清翔会 シフト</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f5f3;color:#1a1a18;font-size:13px;}
.hdr{background:#fff;border-bottom:1px solid #ddd;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.tab-btn{padding:6px 14px;border:none;background:#f0f0ee;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:#666;white-space:nowrap;}
.tab-btn.on{background:#1a1a18;color:#fff;}
.month-nav{display:flex;align-items:center;gap:4px;}
.month-nav button{width:34px;height:32px;border:1px solid #ddd;background:#fff;border-radius:8px;font-size:18px;cursor:pointer;font-weight:700;}
.month-nav span{font-size:17px;font-weight:800;min-width:120px;text-align:center;color:#1a5276;cursor:pointer;}
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.refresh-btn{padding:6px 16px;border:none;background:#1565c0;color:#fff;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.refresh-btn:hover{background:#0d47a1;}
#sb{display:none;position:fixed;top:50px;right:12px;z-index:200;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.today-hdr{background:#fdd835!important;color:#333!important;font-weight:800!important;}
.work-count-badge{display:inline-block;background:#e8f5e9;color:#2e7d32;font-size:9px;font-weight:700;border-radius:4px;padding:1px 4px;margin-left:4px;}
.grid-wrap{overflow:auto;height:calc(100vh - 52px);}
table.grid{border-collapse:collapse;white-space:nowrap;}
table.grid th,table.grid td{border:1px solid #d0d0cc;padding:0;text-align:center;font-size:10px;}
table.grid th{background:#e0ddd6;font-weight:700;position:sticky;top:0;z-index:10;padding:4px 2px;border-bottom:2px solid #bbb;}
.fix-left{position:sticky;left:0;z-index:11;background:#edebe6;}
.fix-left-body{position:sticky;left:0;z-index:5;background:#fff;}
.shift-cell{width:32px;min-width:32px;height:24px;user-select:none;}
.date-hdr{min-width:32px;padding:2px 1px!important;font-size:9px;}
.sun{color:#e05252;background:#fff5f5!important;}.sat{color:#4a7fd4;background:#f0f5ff!important;}
.hol-badge{background:#e05252;color:#fff;font-size:7px;border-radius:3px;padding:0 3px;margin-left:1px;}
.closed-cell{width:50px;min-width:50px;height:26px;font-weight:700;font-size:10px;}
.person-sel{padding:8px 16px;border-radius:16px;border:1.5px solid #ddd;background:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin:2px;}
.person-sel.on{background:#1a1a18;color:#fff;border-color:#1a1a18;}
.pcal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.pcal-cell{border-radius:8px;min-height:90px;padding:6px;background:#fff;border:1px solid #eee;font-size:12px;}
.pcal-cell.sun{background:#fff5f5;}.pcal-cell.sat{background:#f0f5ff;}
.doc-chip{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;margin:2px;}
.req-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.req-cell{border-radius:8px;min-height:50px;padding:6px 4px;background:#fff;border:2px solid #eee;cursor:pointer;text-align:center;font-size:11px;font-weight:600;}
.req-cell.sel{border-color:#7b2d8b;background:#f3e5f5;}
.req-type{padding:8px 14px;border-radius:12px;border:2px solid #ddd;background:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;margin:3px;}
.req-type.on{border-color:#7b2d8b;background:#7b2d8b;color:#fff;}
.sum-tbl{border-collapse:collapse;width:100%;}
.sum-tbl th,.sum-tbl td{border:1px solid #d0d0cc;padding:4px 6px;text-align:center;font-size:11px;}
.sum-tbl th{background:#edebe6;font-weight:600;}
.cc-esca{--cc:#c0392b;--cb:#fdf0ee;}.cc-r{--cc:#7030a0;--cb:#f5eef8;}
.cc-wiz{--cc:#1e8449;--cb:#e9f7ef;}.cc-luminas{--cc:#27ae60;--cb:#e8f5e9;}
.cc-chaya{--cc:#d4a017;--cb:#fef9e7;}.cc-asano{--cc:#85200c;--cb:#fdf3ea;}
.cc-chiryu{--cc:#0a6b8a;--cb:#e0f2f8;}.cc-komaki{--cc:#d81b60;--cb:#fce4ec;}
.cc-yagoto{--cc:#8b4513;--cb:#f9ece2;}.cc-yagoto1{--cc:#9b6b3a;--cb:#f7ead8;}.cc-yagoto2{--cc:#a0522d;--cb:#faf0e6;}
.cc-omori{--cc:#1f6b4e;--cb:#e4f4ed;}.cc-kyoto{--cc:#6b3a87;--cb:#f2ecf8;}.cc-ginza{--cc:#7d6608;--cb:#f8f3e2;}
.cc-houmon1{--cc:#2c6e8a;--cb:#e6eef5;}.cc-houmon2{--cc:#4a9bb5;--cb:#e8f2f6;}.cc-toin{--cc:#b85c00;--cb:#fff3e0;}
.cc-yasumi{--cc:#999;--cb:#f2f2f0;}.cc-yukyu{--cc:#c0392b;--cb:#f0f0ee;}
.cc-daikyu{--cc:#1a5276;--cb:#e8f4fd;}.cc-daishutsu{--cc:#555;--cb:#f0f0ee;}
.cc-kyushutsu{--cc:#e67e22;--cb:#fef5e7;}
.cc-kibou_shutskin{--cc:#2e7d32;--cb:#e8f5e9;}.cc-kibou_clinic{--cc:#1a5276;--cb:#e8f4fd;}
@media(max-width:768px){
  .hdr{padding:4px 8px;gap:4px;}
  .tab-btn{padding:4px 8px;font-size:10px;}
  .month-nav span{font-size:12px;min-width:80px;}
  .refresh-btn{padding:4px 10px;font-size:10px;}
  .grid-wrap{height:calc(100vh - 82px);-webkit-overflow-scrolling:touch;}
  .shift-cell{width:26px;min-width:26px;height:22px;font-size:7px!important;}
  .date-hdr{min-width:26px!important;font-size:8px!important;}
  .pcal-cell{min-height:64px;font-size:10px;}
  .person-sel{padding:5px 10px;font-size:11px;}
}
@media print{.hdr,#sb{display:none!important;}.grid-wrap{height:auto;overflow:visible;}}
</style>
</head>
<body>
<div class="hdr">
  <div class="month-nav">
    <button onclick="chgMonth(-1)">‹</button>
    <span id="monthLbl" onclick="goToday()" title="今月に戻る"></span>
    <button onclick="chgMonth(1)">›</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:2px;">
    <button class="tab-btn on" onclick="setTab(0)">シフト表</button>
    <button class="tab-btn" onclick="setTab(1)">医院別</button>
    <button class="tab-btn" onclick="setTab(2)">個人</button>
    <button class="tab-btn" onclick="setTab(3)">希望申請</button>
    <button class="tab-btn" onclick="setTab(4)">休診日</button>
    <button class="tab-btn" onclick="setTab(5)">集計</button>
  </div>
  <div class="hdr-right">
    <button class="refresh-btn" onclick="refreshFromSheet()" id="refreshBtn">🔄 更新</button>
  </div>
</div>
<div id="sb"></div>
<div id="tab0" class="grid-wrap"><table class="grid" id="shiftTable"></table></div>
<div id="tab1" class="grid-wrap" style="display:none;padding:10px;"><div id="clinicCarousel" style="display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:12px;-webkit-overflow-scrolling:touch;padding-bottom:8px;"></div></div>
<div id="tab2" class="grid-wrap" style="display:none;padding:10px;"><div id="personSelBar" style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;"></div><div id="personView"></div></div>
<div id="tab3" class="grid-wrap" style="display:none;padding:10px;"><div id="reqDocBar" style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;"></div><div id="reqView"></div></div>
<div id="tab4" class="grid-wrap" style="display:none"><table class="grid" id="closedTable"></table></div>
<div id="tab5" class="grid-wrap" style="display:none;padding:12px;"><div id="summaryView"></div></div>

<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbymkh4PvHgIj74kT90srf0WetZbmjL5QyyshfJ-9M68dHzOv4TodeqUTFwsHAtFtWDp/exec';
var CLINICS=[
  {id:'esca',n:'ｴｽｶ'},{id:'r',n:'ｱｰﾙ'},
  {id:'wiz',n:'ｳｨｽﾞ'},{id:'luminas',n:'ﾙﾐﾅｽ'},
  {id:'chaya',n:'茶屋'},
  {id:'chiryu',n:'知立'},{id:'komaki',n:'小牧'},
  {id:'yagoto',n:'八事'},{id:'omori',n:'大森'},
  {id:'kyoto',n:'京都'},{id:'ginza',n:'銀座'},
  {id:'asano',n:'ｱｻﾉ'},{id:'yagoto1',n:'八事1'},{id:'yagoto2',n:'八事2'},
  {id:'houmon1',n:'訪1'},{id:'houmon2',n:'訪2'},{id:'toin',n:'東員'}
];
var STATUSES=[{id:'yasumi',n:'休み'},{id:'yukyu',n:'有給'},{id:'daikyu',n:'代休'},{id:'daishutsu',n:'代出'},{id:'kyushutsu',n:'休日出勤'}];
var ALL=CLINICS.concat(STATUSES);
var doctors=[
  {id:'d1',n:'越知',dir:'esca'},{id:'d2',n:'荒木',dir:'chaya'},
  {id:'d3',n:'山田',dir:'luminas'},{id:'d4',n:'古田',dir:'r'},
  {id:'d5',n:'原',dir:'wiz'},{id:'d6',n:'竹内',dir:'komaki'},
  {id:'d7',n:'大西',dir:'chiryu'},{id:'d8',n:'田村',dir:'yagoto'},
  {id:'d9',n:'立松'},{id:'d10',n:'武内'},{id:'d11',n:'長谷川'},
  {id:'d12',n:'永江'},{id:'d13',n:'れみ'},{id:'d14',n:'西村'},
  {id:'d15',n:'鈴木'},{id:'d16',n:'星野'},{id:'d17',n:'綱島'},
  {id:'d18',n:'向田'},{id:'d19',n:'清水'},{id:'d20',n:'内藤'},
  {id:'d21',n:'上野'},{id:'d22',n:'珠里'},{id:'d23',n:'土屋'},
  {id:'d24',n:'青木'},{id:'d25',n:'小倉'},{id:'d26',n:'河野'},
  {id:'d27',n:'英'},{id:'d35',n:'中山',dir:'kyoto'},{id:'d29',n:'加藤',dir:'omori'},{id:'d28',n:'小池',dir:'ginza'},
  {id:'d30',n:'太田'},{id:'d31',n:'鶴田'},{id:'d32',n:'木村'},
  {id:'d33',n:'浦野'},{id:'d34',n:'明石'}
];
var CLOSED_WEEKDAY={komaki:[2],chiryu:[3],kyoto:[4],omori:[4],chaya:[4],toin:[0]};
var HOL_CLOSED=['esca','r','wiz','omori','toin'];
var SUN_A=['esca','r'];var SUN_B=['wiz','luminas','omori'];
var HOL=new Set(['2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23','2026-12-23']);
var CLOSED_DATES={};
var shifts={},curTab=0;
var today=new Date();
var curY=today.getFullYear(),curM=today.getMonth();

/* ユーティリティ */
var _ccCache={};
function getCC(id){if(!_ccCache[id]){var el=document.createElement('div');el.className='cc-'+id;document.body.appendChild(el);var s=getComputedStyle(el);_ccCache[id]={c:s.getPropertyValue('--cc').trim()||'#999',b:s.getPropertyValue('--cb').trim()||'#f0f0f0'};document.body.removeChild(el);}return _ccCache[id];}
function cname(id){if(!id)return'';var p=ALL.find(function(x){return x.id===id;});return p?p.n:id;}
function shiftLabel(sh){if(!sh)return'';if(sh.clinicId==='yasumi'&&sh.memo==='希望')return'希望休';if(sh.clinicId==='kibou_shutskin')return'出勤希望';if(sh.clinicId==='houmon')return'訪問';return cname(sh.clinicId);}
function ds(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function showSb(msg,type){var el=document.getElementById('sb');if(!msg){el.style.display='none';return;}el.style.display='block';el.textContent=msg;el.style.background=type==='ok'?'#2e7d32':type==='e'?'#b83030':'#555';setTimeout(function(){el.style.display='none';},type==='e'?4000:2500);}

function isClosed(dateStr,cid){
  var d=new Date(dateStr),w=d.getDay();
  if(cid&&CLOSED_DATES[cid+'_open']&&CLOSED_DATES[cid+'_open'].indexOf(dateStr)>=0)return false;
  if(cid&&CLOSED_DATES[cid]&&CLOSED_DATES[cid].indexOf(dateStr)>=0)return true;
  if(cid&&CLOSED_WEEKDAY[cid]&&CLOSED_WEEKDAY[cid].indexOf(w)>=0)return true;
  if(w===0&&cid){var inA=SUN_A.indexOf(cid)>=0,inB=SUN_B.indexOf(cid)>=0;if(inA||inB){var ref=Date.UTC(2026,5,7),cur=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate());var wk=Math.round((cur-ref)/(7*864e5));if(((wk%2)+2)%2===0&&inA)return true;if(((wk%2)+2)%2!==0&&inB)return true;}}
  if(HOL.has(dateStr)&&cid&&HOL_CLOSED.indexOf(cid)>=0)return true;
  return false;
}

/* データ読込 */
function loadClosed(){try{var s=localStorage.getItem('seishokai_closed_v2');if(s){var d=JSON.parse(s);Object.keys(d).forEach(function(k){CLOSED_DATES[k]=d[k];});}}catch(e){}}
function loadCache(){try{var s=localStorage.getItem('seishokai_shifts_v2');if(s){shifts=JSON.parse(s);}}catch(e){}}

function refreshFromSheet(){
  var btn=document.getElementById('refreshBtn');
  btn.textContent='読込中...';btn.style.background='#555';btn.disabled=true;
  showSb('スプレッドシートから読込中...','');
  var month=curY+'-'+String(curM+1).padStart(2,'0');
  var startTime=Date.now();
  fetch(GAS_URL+'?action=read&month='+month)
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(data){
    if(!data||typeof data!=='object'||!data.shifts||typeof data.shifts!=='object'){
      btn.textContent='\u26A0 データなし';btn.style.background='#e65100';btn.disabled=false;
      setTimeout(function(){btn.textContent='\uD83D\uDD04 更新';btn.style.background='#1565c0';},3000);
      renderTab();
      showSb('データが空または不正な形式です','e');
      return;
    }
      /* GASにデータがある場合のみ当月をクリアして上書き */
      var hasData=Object.keys(data.shifts).length>0;
      var days=dim(curY,curM);
      if(hasData){for(var d=1;d<=days;d++){var k=ds(curY,curM,d);shifts[k]=[];}}
      Object.keys(data.shifts).forEach(function(dateStr){
        if(!shifts[dateStr])shifts[dateStr]=[];
        var entries=data.shifts[dateStr];
        if(!Array.isArray(entries))return;
        entries.forEach(function(entry){
          if(!entry||!entry.docName)return;
          var doc=doctors.find(function(d){return d.n===entry.docName;});
          if(!doc)return;
          var cl=ALL.find(function(a){return a.n===entry.clinic||a.id===entry.clinic;});
          var cid=cl?cl.id:entry.clinic;
          var memo='';
          if(entry.clinic==='希望休'){cid='yasumi';memo='希望';}
          else if(entry.clinic==='出勤希望'){cid='kibou_shutskin';}
          else if(entry.clinic==='訪問'){cid='houmon';}
          shifts[dateStr].push({docId:doc.id,clinicId:cid,memo:memo});
        });
      });
      if(data.closedDates&&typeof data.closedDates==='object'){
        Object.keys(data.closedDates).forEach(function(k){CLOSED_DATES[k]=data.closedDates[k];});
        try{localStorage.setItem('seishokai_closed_v2',JSON.stringify(CLOSED_DATES));}catch(e){}
      }
      try{localStorage.setItem('seishokai_shifts_v2',JSON.stringify(shifts));}catch(e){}
    var elapsed=((Date.now()-startTime)/1000).toFixed(1);
    btn.textContent='✓ 更新済';btn.style.background='#2e7d32';btn.disabled=false;
    setTimeout(function(){btn.textContent='🔄 更新';btn.style.background='#1565c0';},2000);
    renderTab();
    showSb(month+' 読込完了（'+elapsed+'秒）','ok');
  }).catch(function(e){
    btn.textContent='✗ エラー';btn.style.background='#b83030';btn.disabled=false;
    setTimeout(function(){btn.textContent='🔄 更新';btn.style.background='#1565c0';},3000);
    showSb('読込エラー: '+(e.message||'通信失敗'),'e');
  });
}

/* ナビ */
function chgMonth(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}updateMonthLbl();renderTab();refreshFromSheet();}
function updateMonthLbl(){document.getElementById('monthLbl').textContent=curY+'年'+(curM+1)+'月';}
function goToday(){curY=today.getFullYear();curM=today.getMonth();updateMonthLbl();renderTab();}
function setTab(n){curTab=n;document.querySelectorAll('.tab-btn').forEach(function(b,i){b.classList.toggle('on',i===n);});['tab0','tab1','tab2','tab3','tab4','tab5'].forEach(function(id,i){document.getElementById(id).style.display=i===n?'':'none';});renderTab();}
function renderTab(){if(curTab===0)renderShifts();else if(curTab===1)renderClinicView();else if(curTab===2)renderPersonView();else if(curTab===3)renderReqView();else if(curTab===4)renderClosed();else renderSummary();}
function goToPerson(docId){selPerson=docId;setTab(2);}

/* Tab 0: シフト表（表示のみ） */
function renderShifts(){
  var days=dim(curY,curM),DOW=['日','月','火','水','木','金','土'];
  var isToday=function(d){return today.getFullYear()===curY&&today.getMonth()===curM&&today.getDate()===d;};
  var restIds=new Set(['yasumi','yukyu','daikyu','kibou_shutskin']);
  var h='<thead><tr><th class="fix-left date-hdr" style="z-index:12;">日付</th>';
  for(var d=1;d<=days;d++){var dateStr=ds(curY,curM,d),w=new Date(curY,curM,d).getDay(),isH=HOL.has(dateStr),cls=w===0||isH?'sun':w===6?'sat':'';
    h+='<th class="date-hdr '+cls+(isToday(d)?' today-hdr':'')+'">'+d+'<span style="font-size:8px;margin-left:1px;">'+DOW[w]+'</span>'+(isH?'<span class="hol-badge">祝</span>':'')+'</th>';}
  h+='<th class="date-hdr" style="z-index:12;position:sticky;right:0;background:#e0ddd6;">名前</th></tr></thead><tbody>';
  doctors.forEach(function(doc,ri){
    var workDays=0;for(var dd=1;dd<=days;dd++){var sh2=(shifts[ds(curY,curM,dd)]||[]).find(function(s){return s.docId===doc.id;});if(sh2&&!restIds.has(sh2.clinicId))workDays++;}
    var oddBg=ri%2===1?'background:#fafaf8;':'';
    h+='<tr><td class="fix-left-body" style="font-size:11px;font-weight:700;padding:2px 6px;white-space:nowrap;border-right:2px solid #bbb;cursor:pointer;color:#1a5276;'+oddBg+'" onclick="goToPerson(\''+doc.id+'\')">'+doc.n+'<span class="work-count-badge">'+workDays+'</span></td>';
    for(var d=1;d<=days;d++){var dateStr=ds(curY,curM,d),w=new Date(curY,curM,d).getDay(),isH=HOL.has(dateStr);
      var sh=(shifts[dateStr]||[]).find(function(s){return s.docId===doc.id;});
      var bg='',txt='',col='';
      if(sh){var isKibo=sh.clinicId==='yasumi'&&sh.memo==='希望';
        if(isKibo){bg='#f3e5f5';col='#7b2d8b';txt='希望休';}
        else if(sh.clinicId==='yasumi'){bg='#eceff1';col='#78909c';txt='休み';}
        else if(sh.clinicId==='yukyu'){bg='#eceff1';col='#e53935';txt='有給';}
        else if(sh.clinicId==='daikyu'){bg='#eceff1';col='#1a5276';txt='代休';}
        else if(sh.clinicId==='daishutsu'){bg='#777';col='#fff';txt='代出';}
        else if(sh.clinicId==='kyushutsu'){bg='#e67e22';col='#fff';txt='休出';}
        else if(sh.clinicId==='kibou_shutskin'){bg='#e8f5e9';col='#2e7d32';txt='出勤希望';}
        else if(sh.clinicId==='houmon'){bg='#2c6e8a';col='#fff';txt='訪問';}
        else{var c=getCC(sh.clinicId);bg=c.c;col='#fff';txt=cname(sh.clinicId);}
      }else{bg=w===0||isH?'#fff5f5':w===6?'#f0f5ff':'';col='';txt='';}
      var tdStyle='background:'+bg+';color:'+col+';font-weight:700;font-size:8px;line-height:24px;'+(isToday(d)?'box-shadow:inset 0 0 0 1px #fdd835;':'')+(ri%2===1&&!sh?oddBg:'');
      h+='<td class="shift-cell" style="'+tdStyle+'">'+txt+'</td>';}
    h+='<td style="position:sticky;right:0;z-index:5;background:#fff;font-size:11px;font-weight:700;padding:2px 6px;white-space:nowrap;border-left:2px solid #bbb;color:#1a5276;'+oddBg+'">'+doc.n+'<span class="work-count-badge">'+workDays+'</span></td></tr>';});
  h+='</tbody>';
  /* 出勤人数フッター */
  h+='<tfoot><tr><td class="fix-left" style="z-index:12;position:sticky;bottom:0;background:#e8f5e9;font-size:9px;font-weight:700;color:#2e7d32;">出勤</td>';

    h+='<td style="position:sticky;bottom:0;background:#e8f5e9;font-size:9px;font-weight:700;color:#2e7d32;'+(isToday(d)?'background:#fffde7;':'')+'">'+cnt+'</td>';}

  for(var d=1;d<=days;d++){var dateStr=ds(curY,curM,d),w=new Date(curY,curM,d).getDay(),isH=HOL.has(dateStr),cls=w===0||isH?'sun':w===6?'sat':'';
    h+='<td class="date-hdr '+cls+'" style="position:sticky;bottom:0;background:#ddd;font-weight:700;">'+d+'<span style="font-size:8px;margin-left:1px;">'+DOW[w]+'</span>'+(isH?'<span class="hol-badge">祝</span>':'')+'</td>';}

/* Tab 1: 医院別カルーセル */

    var cid=cl.id,col=getCC(cid);

    var days=dim(sY,sM);
    h+='<div style="flex:0 0 280px;scroll-snap-align:start;border:2px solid '+col.c+';border-radius:12px;background:#fff;overflow:hidden;">';
    h+='<div style="background:'+col.c+';color:#fff;padding:6px 10px;display:flex;align-items:center;justify-content:center;gap:8px;">';
    h+='<button onclick="clinicViewMonth[\''+cid+'\']=(clinicViewMonth[\''+cid+'\']||0)-1;renderClinicView();" style="border:none;background:rgba(255,255,255,.3);color:#fff;border-radius:6px;width:24px;height:24px;font-size:14px;cursor:pointer;">‹</button>';
    h+='<span style="font-size:14px;font-weight:800;">'+cl.n+' '+(sM+1)+'月</span>';
    h+='<button onclick="clinicViewMonth[\''+cid+'\']=(clinicViewMonth[\''+cid+'\']||0)+1;renderClinicView();" style="border:none;background:rgba(255,255,255,.3);color:#fff;border-radius:6px;width:24px;height:24px;font-size:14px;cursor:pointer;">›</button></div>';
    h+='<div style="max-height:calc(100vh - 140px);overflow-y:auto;">';
    for(var d=1;d<=days;d++){
      var dateStr=ds(sY,sM,d),w=new Date(sY,sM,d).getDay(),isH=HOL.has(dateStr);
      var closed=isClosed(dateStr,cid),assigned=(shifts[dateStr]||[]).filter(function(s){return s.clinicId===cid;});
      var dayCol=w===0||isH?'#e05252':w===6?'#4a7fd4':'#333',rowBg=closed?'#f5f5f3':assigned.length>=2?col.b:'#fff';
      h+='<div style="display:flex;align-items:center;gap:5px;padding:4px 8px;border-bottom:1px solid #eee;background:'+rowBg+';">';
      h+='<span style="font-weight:700;color:'+dayCol+';min-width:30px;font-size:12px;">'+d+DOW[w]+'</span>';
      if(closed){h+='<span style="color:#bbb;font-size:11px;">休診</span>';}
      else{h+='<span style="background:'+(assigned.length?col.c:'#eee')+';color:'+(assigned.length?'#fff':'#bbb')+';font-size:11px;font-weight:800;border-radius:4px;padding:1px 6px;min-width:22px;text-align:center;">'+assigned.length+'</span>';
        var sorted=assigned.slice().sort(function(a,b){var da=doctors.find(function(d){return d.id===a.docId;}),db=doctors.find(function(d){return d.id===b.docId;});return(da&&da.dir===cid?0:1)-(db&&db.dir===cid?0:1);});
        h+='<span style="font-size:11px;color:'+col.c+';font-weight:600;">'+sorted.map(function(s){var doc=doctors.find(function(dd){return dd.id===s.docId;});if(!doc)return'';return doc.dir===cid?'<b>'+doc.n+'</b>':doc.n;}).join(' ')+'</span>';}
      h+='</div>';}
    h+='</div></div>';});
  document.getElementById('clinicCarousel').innerHTML=h;
}

/* Tab 2: 個人ビュー */

  var doc=doctors.find(function(d){return d.id===selPerson;});

    var dateStr=ds(curY,curM,d),w=new Date(curY,curM,d).getDay(),isH=HOL.has(dateStr);

    h+='<div class="pcal-cell '+cls+'">';
    h+='<div style="font-weight:800;font-size:14px;color:'+(w===0||isH?'#e05252':w===6?'#4a7fd4':'#333')+';">'+d+(isH?' <span class="hol-badge" style="font-size:8px;">祝</span>':'')+'</div>';
    if(sh){var isKibo=sh.clinicId==='yasumi'&&sh.memo==='希望';var col=isKibo?{c:'#7b2d8b',b:'#f3e5f5'}:getCC(sh.clinicId);
      h+='<div style="background:'+col.c+';color:#fff;border-radius:6px;padding:4px 6px;font-size:13px;font-weight:700;text-align:center;margin-top:3px;">'+(isKibo?'希望休':shiftLabel(sh))+'</div>';
      if(!restIds.has(sh.clinicId)){var mates=(shifts[dateStr]||[]).filter(function(s){return s.docId!==selPerson&&s.clinicId===sh.clinicId;});
        if(mates.length){h+='<div style="margin-top:2px;">';mates.forEach(function(m){var md=doctors.find(function(dd){return dd.id===m.docId;});h+='<div style="font-size:12px;color:'+col.c+';font-weight:600;line-height:1.5;">'+(md?md.n:'')+'</div>';});h+='</div>';}}}
    h+='</div>';}

}

/* Tab 3: シフト希望 */
var reqDocId=null,reqSelDates=new Set(),reqType='yasumi',reqClinicId=null;
function renderReqView(){
  var bar=document.getElementById('reqDocBar');
  bar.innerHTML=doctors.map(function(doc){return '<button class="person-sel'+(reqDocId===doc.id?' on':'')+'" onclick="reqDocId=\''+doc.id+'\';reqSelDates.clear();renderReqView();">'+doc.n+'</button>';}).join('');
  if(!reqDocId){document.getElementById('reqView').innerHTML='<p style="color:#999;text-align:center;padding:40px;">名前を選んでください</p>';return;}
  var doc=doctors.find(function(d){return d.id===reqDocId;});
  var days=dim(curY,curM),DOW=['日','月','火','水','木','金','土'],firstDow=new Date(curY,curM,1).getDay();
  var h='<h3 style="font-size:15px;font-weight:800;margin-bottom:8px;">'+doc.n+'｜'+(curM+1)+'月 シフト希望</h3>';
  h+='<div style="margin-bottom:10px;">';
  [{id:'yasumi',n:'休み希望',col:'#999'},{id:'yukyu',n:'有給',col:'#e53935'},{id:'daishutsu',n:'代出',col:'#555'},{id:'houmon1',n:'訪1',col:'#2c6e8a'},{id:'houmon2',n:'訪2',col:'#4a9bb5'},{id:'kibou_shutskin',n:'出勤希望',col:'#2e7d32'},{id:'kibou_clinic',n:'希望医院',col:'#1a5276'}].forEach(function(t){
    h+='<button class="req-type'+(reqType===t.id?' on':'')+'" onclick="reqType=\''+t.id+'\';renderReqView();" style="'+(reqType===t.id?'border-color:'+t.col+';background:'+t.col:'')+'">'+t.n+'</button>';});
  h+='</div>';
  if(reqType==='kibou_clinic'){h+='<div style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px;">';CLINICS.forEach(function(c){var col=getCC(c.id),on=reqClinicId===c.id;h+='<button onclick="reqClinicId=\''+c.id+'\';renderReqView();" style="padding:5px 10px;border-radius:10px;border:2px solid '+(on?col.c:'#ddd')+';background:'+(on?col.c:'#fff')+';color:'+(on?'#fff':col.c)+';font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;">'+c.n+'</button>';});h+='</div>';}
  h+='<div class="req-cal">';
  DOW.forEach(function(d,i){h+='<div style="text-align:center;font-size:10px;font-weight:700;padding:4px;color:'+(i===0?'#e05252':i===6?'#4a7fd4':'#999')+';">'+d+'</div>';});
  for(var i=0;i<firstDow;i++)h+='<div></div>';
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d),w=new Date(curY,curM,d).getDay(),isH=HOL.has(dateStr),sel=reqSelDates.has(dateStr);
    var existing=(shifts[dateStr]||[]).find(function(s){return s.docId===reqDocId;});
    var closedClinics=CLINICS.filter(function(c){return isClosed(dateStr,c.id);});
    var cellBg=sel?'#f3e5f5':isH?'#fff0f0':w===0?'#fff5f5':w===6?'#f0f5ff':'#fff';
    h+='<div class="req-cell'+(sel?' sel':'')+'" onclick="toggleReqDate(\''+dateStr+'\')" style="background:'+cellBg+';color:'+(w===0||isH?'#e05252':w===6?'#4a7fd4':'#333')+';">';
    h+='<div style="font-weight:700;">'+d+(isH?' <span class="hol-badge">祝</span>':'')+'</div>';
    if(closedClinics.length&&closedClinics.length<CLINICS.length)h+='<div style="font-size:7px;color:#999;line-height:1.3;">休:'+closedClinics.map(function(c){return c.n;}).join(',')+'</div>';
    if(existing)h+='<div style="font-size:8px;color:#7b2d8b;font-weight:600;">現:'+shiftLabel(existing)+'</div>';
    if(sel)h+='<div style="font-size:9px;color:#7b2d8b;font-weight:800;">✓</div>';
    h+='</div>';}
  h+='</div><div style="margin-top:12px;text-align:center;"><button onclick="submitReq()" style="padding:10px 30px;border:none;background:#7b2d8b;color:#fff;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;">'+reqSelDates.size+'日分を申請する</button></div>';
  /* 登録状況 */
  var reqs=[],DOW2=['日','月','火','水','木','金','土'];
  for(var d2=1;d2<=days;d2++){var ds2=ds(curY,curM,d2);var ex=(shifts[ds2]||[]).find(function(s){return s.docId===reqDocId;});if(ex)reqs.push({d:d2,ds:ds2,w:new Date(curY,curM,d2).getDay(),sh:ex});}
  if(reqs.length){h+='<div style="margin-top:16px;border-top:2px solid #eee;padding-top:12px;"><h4 style="font-size:13px;font-weight:700;margin-bottom:8px;">現在の登録状況</h4><table style="border-collapse:collapse;width:100%;font-size:12px;"><tbody>';
    reqs.forEach(function(r){var isKibo=r.sh.clinicId==='yasumi'&&r.sh.memo==='希望';var bgCol=isKibo?'#7b2d8b':r.sh.clinicId==='yasumi'?'#999':r.sh.clinicId==='yukyu'?'#e53935':getCC(r.sh.clinicId).c;
      h+='<tr style="border-bottom:1px solid #eee;"><td style="padding:4px 8px;font-weight:700;color:'+(r.w===0?'#e05252':r.w===6?'#4a7fd4':'#333')+';width:70px;">'+r.d+'('+DOW2[r.w]+')</td><td style="padding:4px 8px;"><span style="background:'+bgCol+';color:#fff;padding:2px 8px;border-radius:6px;font-weight:700;font-size:11px;">'+shiftLabel(r.sh)+'</span></td><td style="padding:4px 8px;text-align:right;"><button onclick="cancelReq(\''+r.ds+'\')" style="padding:3px 10px;border:1px solid #e53935;background:#fff;color:#e53935;border-radius:6px;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;">取消</button></td></tr>';});
    h+='</tbody></table></div>';}
  document.getElementById('reqView').innerHTML=h;
}
function toggleReqDate(dateStr){reqSelDates.has(dateStr)?reqSelDates.delete(dateStr):reqSelDates.add(dateStr);renderReqView();}
function submitReq(){
  if(!reqDocId||!reqSelDates.size)return;
  if(reqType==='kibou_clinic'&&!reqClinicId){showSb('希望医院を選んでください','e');return;}
  var doc=doctors.find(function(d){return d.id===reqDocId;});
  var reqs=[];
  reqSelDates.forEach(function(dateStr){
    var cid,memo='',typeName='';
    if(reqType==='yasumi'){cid='yasumi';memo='希望';typeName='希望休';}
    else if(reqType==='yukyu'){cid='yukyu';typeName='有給';}
    else if(reqType==='daishutsu'){cid='daishutsu';typeName='代出';}
    else if(reqType==='houmon1'){cid='houmon1';typeName='訪1';}
    else if(reqType==='houmon2'){cid='houmon2';typeName='訪2';}
    else if(reqType==='kibou_shutskin'){cid='kibou_shutskin';typeName='出勤希望';}
    else if(reqType==='kibou_clinic'){cid=reqClinicId||'yasumi';typeName=cname(cid);}
    if(!shifts[dateStr])shifts[dateStr]=[];
    var idx=shifts[dateStr].findIndex(function(s){return s.docId===reqDocId;});
    var entry={docId:reqDocId,clinicId:cid,memo:memo};
    if(idx>=0)shifts[dateStr][idx]=entry;else shifts[dateStr].push(entry);
    reqs.push({docName:doc.n,date:dateStr,type:typeName});
  });
  try{localStorage.setItem('seishokai_shifts_v2',JSON.stringify(shifts));}catch(e){}
  /* GASに送信 */
  fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'writeRequests',requests:reqs})
  }).then(function(){showSb('シフト希望を申請しました','ok');}).catch(function(){showSb('申請エラー','e');});
  reqSelDates.clear();renderReqView();
}
function cancelReq(dateStr){
  if(!reqDocId)return;
  var doc=doctors.find(function(d){return d.id===reqDocId;});
  if(!confirm(doc.n+'の'+dateStr+'の登録を取り消しますか？'))return;
  if(shifts[dateStr]){
    shifts[dateStr]=shifts[dateStr].filter(function(s){return s.docId!==reqDocId;});
    if(!shifts[dateStr].length)delete shifts[dateStr];
  }
  try{localStorage.setItem('seishokai_shifts_v2',JSON.stringify(shifts));}catch(e){}
  fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'cancelRequest',docName:doc.n,date:dateStr})
  }).then(function(){showSb('取り消しました','ok');}).catch(function(){showSb('取消エラー','e');});
  renderReqView();
}

/* Tab 4: 休診日 */
function renderClosed(){
  var days=dim(curY,curM),DOW=['日','月','火','水','木','金','土'];
  var h='<thead><tr><th class="fix-left" style="z-index:12;min-width:54px;">日付</th>';
  CLINICS.forEach(function(c){var col=getCC(c.id);h+='<th style="padding:4px 6px;font-size:10px;font-weight:700;color:'+col.c+';min-width:44px;">'+c.n+'</th>';});
  h+='<th style="min-width:54px;">日付</th></tr></thead><tbody>';
  for(var d=1;d<=days;d++){var dateStr=ds(curY,curM,d),w=new Date(curY,curM,d).getDay(),isH=HOL.has(dateStr);
    var rowBg=isH?'#fff0f0':w===0?'#fff5f5':w===6?'#f0f5ff':'#fff',numCol=w===0||isH?'#e05252':w===6?'#4a7fd4':'#333';
    h+='<tr style="background:'+rowBg+'"><td class="fix-left-body" style="background:'+rowBg+';padding:4px 6px;font-weight:700;font-size:12px;color:'+numCol+';white-space:nowrap;border-right:2px solid #bbb;">'+d+'<span style="font-size:10px;margin-left:2px;">'+DOW[w]+'</span>'+(isH?'<span class="hol-badge">祝</span>':'')+'</td>';
    CLINICS.forEach(function(c){var closed=isClosed(dateStr,c.id),col=getCC(c.id);h+='<td class="closed-cell" style="background:'+(closed?col.c:'transparent')+';color:'+(closed?'#fff':'')+';">'+(closed?'休':'')+'</td>';});
    h+='<td style="padding:4px 6px;font-weight:700;font-size:12px;color:'+numCol+';white-space:nowrap;">'+d+'<span style="font-size:10px;margin-left:2px;">'+DOW[w]+'</span></td></tr>';}
  h+='</tbody>';document.getElementById('closedTable').innerHTML=h;
}

/* Tab 5: 集計 */
function renderSummary(){
  var days=dim(curY,curM),restIds=new Set(['yasumi','yukyu','daikyu','kibou_shutskin']);
  var h='<h3 style="font-size:14px;font-weight:700;margin-bottom:8px;">ドクター別出勤日数（'+(curM+1)+'月）</h3>';
  h+='<table class="sum-tbl"><thead><tr><th>ドクター</th><th>出勤</th><th>休み</th><th>有給</th><th>希望休</th></tr></thead><tbody>';
  doctors.forEach(function(doc){var work=0,off=0,yuk=0,kibo=0;
    for(var d=1;d<=days;d++){var sh=(shifts[ds(curY,curM,d)]||[]).find(function(s){return s.docId===doc.id;});
      if(sh){if(sh.clinicId==='yukyu')yuk++;else if(sh.clinicId==='yasumi'&&sh.memo==='希望')kibo++;else if(restIds.has(sh.clinicId))off++;else work++;}}
    h+='<tr><td style="font-weight:700;">'+doc.n+'</td><td style="font-weight:700;color:#2e7d32;">'+work+'</td><td>'+off+'</td><td style="color:#e53935;">'+yuk+'</td><td style="color:#7b2d8b;">'+kibo+'</td></tr>';});
  h+='</tbody></table>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:20px 0 8px;">医院別配置人数（'+(curM+1)+'月）</h3>';
  h+='<table class="sum-tbl"><thead><tr><th>日付</th>';CLINICS.forEach(function(c){var col=getCC(c.id);h+='<th style="color:'+col.c+';">'+c.n+'</th>';});h+='</tr></thead><tbody>';
  for(var d=1;d<=days;d++){var dateStr=ds(curY,curM,d),w=new Date(curY,curM,d).getDay(),DOW=['日','月','火','水','木','金','土'],isH=HOL.has(dateStr);
    h+='<tr><td style="font-weight:700;color:'+(w===0||isH?'#e05252':w===6?'#4a7fd4':'')+';">'+d+'('+DOW[w]+')'+(isH?' <span class="hol-badge">祝</span>':'')+'</td>';
    CLINICS.forEach(function(c){var cnt=(shifts[dateStr]||[]).filter(function(s){return s.clinicId===c.id;}).length,closed=isClosed(dateStr,c.id);
      h+='<td style="background:'+(closed?'#f0f0ee':cnt?getCC(c.id).b:'')+';font-weight:'+(cnt?'700':'400')+';color:'+(closed?'#bbb':cnt?getCC(c.id).c:'#ccc')+';">'+(closed?'休':cnt||'')+'</td>';});
    h+='</tr>';}h+='</tbody></table>';
  document.getElementById('summaryView').innerHTML=h;
}
