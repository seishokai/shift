<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>清翔会 シフト</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f5f3;color:#1a1a18;font-size:13px;}
/* ヘッダー */
.hdr{background:#fff;border-bottom:1px solid #ddd;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.hdr h1{font-size:15px;font-weight:800;white-space:nowrap;}
.hdr-tabs{display:flex;gap:2px;}
.tab-btn{padding:6px 14px;border:none;background:#f0f0ee;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:#666;}
.tab-btn.on{background:#1a1a18;color:#fff;}
.month-nav{display:flex;align-items:center;gap:4px;margin-left:auto;}
.month-nav button{width:32px;height:30px;border:1px solid #ddd;background:#fff;border-radius:8px;font-size:16px;cursor:pointer;}
.month-nav span{font-size:14px;font-weight:700;min-width:110px;text-align:center;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.save-btn{padding:6px 16px;border:none;background:#2e7d32;color:#fff;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
.save-btn:hover{background:#1b5e20;}
.login-btn{padding:5px 12px;border:1px solid #ddd;background:#fff;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer;}
.undo-btn{padding:5px 10px;border:1px solid #ddd;background:#fff;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer;}
/* ステータスバー */
#sb{display:none;position:fixed;top:50px;right:12px;z-index:200;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);}
/* テーブル共通 */
.grid-wrap{overflow:auto;height:calc(100vh - 52px);}
table.grid{border-collapse:collapse;white-space:nowrap;}
table.grid th,table.grid td{border:1px solid #d0d0cc;padding:0;text-align:center;font-size:10px;}
table.grid th{background:#edebe6;font-weight:600;position:sticky;top:0;z-index:10;padding:4px 2px;}
.fix-left{position:sticky;left:0;z-index:11;background:#edebe6;}
.fix-left-body{position:sticky;left:0;z-index:5;background:#fff;}
/* シフトセル */
.shift-cell{width:56px;min-width:56px;height:28px;cursor:pointer;user-select:none;transition:opacity .1s;}
.shift-cell:hover{opacity:.8;}
/* 日付ヘッダー */
.date-hdr{writing-mode:horizontal-tb;min-width:56px;padding:3px 2px !important;}
.sun{color:#e05252;background:#fff5f5 !important;}.sat{color:#4a7fd4;background:#f0f5ff !important;}
.hol-badge{background:#e05252;color:#fff;font-size:7px;border-radius:3px;padding:0 3px;margin-left:1px;}
/* ペイントバー */
#paintBar{display:none;position:sticky;top:0;z-index:50;background:#1a1a18;color:#fff;padding:6px 10px;font-size:12px;}
#paintBar .paint-opt{padding:4px 10px;border-radius:10px;border:2px solid transparent;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;margin:0 2px;}
/* 休診日セル */
.closed-cell{width:50px;min-width:50px;height:26px;cursor:pointer;user-select:none;font-weight:700;font-size:10px;}
.closed-cell:hover{opacity:.8;}
/* 集計 */
.sum-tbl{border-collapse:collapse;width:100%;}
.sum-tbl th,.sum-tbl td{border:1px solid #d0d0cc;padding:4px 6px;text-align:center;font-size:11px;}
.sum-tbl th{background:#edebe6;font-weight:600;}
/* 色 */
.cc-esca{--cc:#c0392b;--cb:#fdf0ee;}.cc-r{--cc:#7030a0;--cb:#f5eef8;}
.cc-wiz{--cc:#1e8449;--cb:#e9f7ef;}.cc-luminas{--cc:#27ae60;--cb:#e8f5e9;}
.cc-chaya{--cc:#d4a017;--cb:#fef9e7;}.cc-asano{--cc:#85200c;--cb:#fdf3ea;}
.cc-chiryu{--cc:#0a6b8a;--cb:#e0f2f8;}.cc-komaki{--cc:#d81b60;--cb:#fce4ec;}
.cc-yagoto{--cc:#8b4513;--cb:#f9ece2;}.cc-omori{--cc:#1f6b4e;--cb:#e4f4ed;}
.cc-kyoto{--cc:#6b3a87;--cb:#f2ecf8;}.cc-ginza{--cc:#7d6608;--cb:#f8f3e2;}
.cc-houmon{--cc:#2c6e8a;--cb:#e6eef5;}.cc-toin{--cc:#b85c00;--cb:#fff3e0;}
.cc-yasumi{--cc:#999;--cb:#f2f2f0;}.cc-yukyu{--cc:#c0392b;--cb:#f0f0ee;}
.cc-daikyu{--cc:#1a5276;--cb:#e8f4fd;}.cc-daishutsu{--cc:#555;--cb:#f0f0ee;}
.cc-kyushutsu{--cc:#e67e22;--cb:#fef5e7;}
@media print{.hdr,#paintBar,#sb{display:none!important;}.grid-wrap{height:auto;overflow:visible;}}
</style>
</head>

<div class="hdr">

  <div class="hdr-tabs">

    <button class="save-btn" onclick="saveAll()" id="saveBtn" style="display:none">💾 保存</button>

  </div>
</div>
<div id="sb"></div>

<div id="tab0" class="grid-wrap">

    <button onclick="setPaint(null)" style="margin-left:auto;padding:3px 10px;border:none;background:rgba(255,255,255,.2);color:#fff;border-radius:8px;font-size:11px;cursor:pointer;">✕ 閉じる</button>
  </div>
  <table class="grid" id="shiftTable"></table>
</div>

<!-- Tab 1: 休診日 -->
<div id="tab1" class="grid-wrap" style="display:none">

</div>

<div id="tab2" class="grid-wrap" style="display:none;padding:12px;">

/* ======= 状態管理 ======= */
var shifts={};
var CLOSED_DATES={};
var curY=2026,curM=5,curTab=0,isAdmin=false;
var paintClinic=null;
var undoStack=[],redoStack=[];
var today=new Date();

/* ======= ユーティリティ ======= */
function cc(id){var el=document.createElement('div');el.className='cc-'+id;document.body.appendChild(el);var s=getComputedStyle(el);var c=s.getPropertyValue('--cc').trim()||'#999';var b=s.getPropertyValue('--cb').trim()||'#f0f0f0';document.body.removeChild(el);return{c:c,b:b};}
var _ccCache={};
function getCC(id){if(!_ccCache[id])_ccCache[id]=cc(id);return _ccCache[id];}
function cname(id){if(!id)return'';var p=ALL.find(function(x){return x.id===id;});return p?p.n:id;}
function shiftLabel(sh){if(!sh)return'';if(sh.clinicId==='yasumi'&&sh.memo==='希望')return'希望休';return cname(sh.clinicId);}
function ds(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function showSb(msg,type){
  var el=document.getElementById('sb');
  if(!msg){el.style.display='none';return;}
  el.style.display='block';el.textContent=msg;
  el.style.background=type==='ok'?'#2e7d32':type==='e'?'#b83030':'#555';
  if(type==='ok')setTimeout(function(){el.style.display='none';},2500);
}

/* ======= 休診日判定 ======= */
function isClosed(dateStr,cid){
  var d=new Date(dateStr),w=d.getDay();
  if(cid&&CLOSED_DATES[cid+'_open']&&CLOSED_DATES[cid+'_open'].indexOf(dateStr)>=0)return false;
  if(cid&&CLOSED_DATES[cid]&&CLOSED_DATES[cid].indexOf(dateStr)>=0)return true;
  if(cid&&CLOSED_WEEKDAY[cid]&&CLOSED_WEEKDAY[cid].indexOf(w)>=0)return true;
  if(w===0&&cid){
    var inA=SUN_A.indexOf(cid)>=0,inB=SUN_B.indexOf(cid)>=0;
    if(inA||inB){
      var ref=Date.UTC(2026,5,7),cur=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate());
      var wk=Math.round((cur-ref)/(7*864e5));
      if(((wk%2)+2)%2===0&&inA)return true;
      if(((wk%2)+2)%2!==0&&inB)return true;
    }
  }
  if(HOL.has(dateStr)&&cid&&HOL_CLOSED.indexOf(cid)>=0)return true;
  return false;
}

/* ======= データ永続化（防弾仕様） ======= */
function countEntries(obj){var n=0;Object.keys(obj).forEach(function(k){if(Array.isArray(obj[k]))n+=obj[k].length;});return n;}

function saveShifts(){
  try{
    var cnt=countEntries(shifts);
    if(cnt===0){
      var old=localStorage.getItem('seishokai_shifts_v2');
      if(old&&countEntries(JSON.parse(old))>5){console.warn('BLOCKED: empty save');return;}
    }
    var j=JSON.stringify(shifts);
    localStorage.setItem('seishokai_shifts_v2',j);
    localStorage.setItem('seishokai_shifts_v2_bak',j);
    localStorage.setItem('seishokai_shifts_v2_ts',new Date().toISOString());
  }catch(e){}
}
function saveClosed(){
  try{var j=JSON.stringify(CLOSED_DATES);localStorage.setItem('seishokai_closed_v2',j);localStorage.setItem('seishokai_closed_v2_bak',j);}catch(e){}
}
function loadData(){
  showSb('読み込み中...');
  /* 1. localStorage */
  var ls;
  try{ls=localStorage.getItem('seishokai_shifts_v2');}catch(e){}
  if(!ls){try{ls=localStorage.getItem('seishokai_shifts_v2_bak');}catch(e){}}
  if(ls){
    try{
      var p=JSON.parse(ls);
      if(countEntries(p)>0){
        shifts=p;
        var ts=localStorage.getItem('seishokai_shifts_v2_ts')||'';
        showSb(countEntries(shifts)+'件読込','ok');
        loadClosed();
        return Promise.resolve();
      }
    }catch(e){}
  }
  /* 2. Supabase + EXCEL_DATA */
  return fetch(SB_URL+'/rest/v1/shifts?select=*&limit=10000',{headers:Object.assign({},SB_H)})
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
  .then(function(rows){
    shifts={};Object.assign(shifts,EXCEL_DATA);
    if(rows&&rows.length){
      rows.forEach(function(row){
        if(!shifts[row.date_str])shifts[row.date_str]=[];
        var idx=shifts[row.date_str].findIndex(function(s){return s.docId===row.doc_id;});
        var e={docId:row.doc_id,clinicId:row.clinic_id,memo:row.memo||''};
        if(idx>=0)shifts[row.date_str][idx]=e;else shifts[row.date_str].push(e);
      });
    }
    saveShifts();
    showSb(countEntries(shifts)+'件読込','ok');
  }).catch(function(){
    shifts={};Object.assign(shifts,EXCEL_DATA);
    showSb('初期データ使用','e');
  }).then(function(){loadClosed();});
}
function loadClosed(){
  try{
    var s=localStorage.getItem('seishokai_closed_v2');
    if(!s)s=localStorage.getItem('seishokai_closed_v2_bak');
    if(s){var d=JSON.parse(s);Object.keys(d).forEach(function(k){CLOSED_DATES[k]=d[k];});}
  }catch(e){}
}

/* Supabase保存（個別） */
function dbSave(dateStr,docId,cid,memo){
  saveShifts();
  var h={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'return=minimal'};
  fetch(SB_URL+'/rest/v1/shifts',{method:'POST',headers:h,
    body:JSON.stringify({date_str:dateStr,doc_id:docId,clinic_id:cid,memo:memo||''})
  }).then(function(r){
    if(r.status===409){
      return fetch(SB_URL+'/rest/v1/shifts?date_str=eq.'+dateStr+'&doc_id=eq.'+docId,{
        method:'PATCH',headers:h,body:JSON.stringify({clinic_id:cid,memo:memo||''})
      });
    }
    return r;
  }).then(function(r){
    if(r.ok||r.status===201||r.status===204)showSb('✓','ok');
    else showSb('保存失敗','e');
  }).catch(function(){showSb('通信エラー','e');});
}
function dbDel(dateStr,docId){
  saveShifts();
  var h={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY};
  fetch(SB_URL+'/rest/v1/shifts?date_str=eq.'+dateStr+'&doc_id=eq.'+docId,{method:'DELETE',headers:h}).catch(function(){});
}
function saveAll(){saveShifts();saveClosed();showSb('保存完了','ok');}

/* ======= Undo/Redo ======= */
function snapshot(){
  var snap={s:JSON.stringify(shifts),c:JSON.stringify(CLOSED_DATES)};
  undoStack.push(snap);if(undoStack.length>30)undoStack.shift();
  redoStack=[];
}
function undo(){
  if(!undoStack.length)return;
  redoStack.push({s:JSON.stringify(shifts),c:JSON.stringify(CLOSED_DATES)});
  var snap=undoStack.pop();
  shifts=JSON.parse(snap.s);CLOSED_DATES=JSON.parse(snap.c);
  saveShifts();saveClosed();renderTab();
}
function redo(){
  if(!redoStack.length)return;
  undoStack.push({s:JSON.stringify(shifts),c:JSON.stringify(CLOSED_DATES)});
  var snap=redoStack.pop();
  shifts=JSON.parse(snap.s);CLOSED_DATES=JSON.parse(snap.c);
  saveShifts();saveClosed();renderTab();
}

/* ======= 認証 ======= */
function toggleLogin(){
  if(isAdmin){isAdmin=false;document.getElementById('loginBtn').textContent='ログイン';document.getElementById('saveBtn').style.display='none';document.getElementById('paintBar').style.display='none';paintClinic=null;renderTab();return;}
  var pw=prompt('パスワード');
  if(pw===ADMIN_PW){isAdmin=true;document.getElementById('loginBtn').textContent='ログアウト';document.getElementById('saveBtn').style.display='';renderTab();}
  else if(pw!==null)alert('パスワードが違います');
}

/* ======= ナビ ======= */
function chgMonth(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}updateMonthLbl();renderTab();}
function updateMonthLbl(){document.getElementById('monthLbl').textContent=curY+'年'+(curM+1)+'月';}
function setTab(n){
  curTab=n;
  document.querySelectorAll('.tab-btn').forEach(function(b,i){b.classList.toggle('on',i===n);});
  ['tab0','tab1','tab2'].forEach(function(id,i){document.getElementById(id).style.display=i===n?'':'none';});
  renderTab();
}
function renderTab(){
  if(curTab===0)renderShifts();
  else if(curTab===1)renderClosed();
  else renderSummary();
}

/* ======= Tab 0: シフト表 ======= */
function renderShifts(){
  var days=dim(curY,curM);
  var DOW=['日','月','火','水','木','金','土'];
  var h='<thead><tr><th class="fix-left date-hdr" style="z-index:12;">日付</th>';
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    var w=new Date(curY,curM,d).getDay();
    var isH=HOL.has(dateStr);
    var cls=w===0||isH?'sun':w===6?'sat':'';
    h+='<th class="date-hdr '+cls+'">'+d+'<span style="font-size:8px;margin-left:1px;">'+DOW[w]+'</span>';
    if(isH)h+='<span class="hol-badge">祝</span>';
    h+='</th>';
  }
  h+='</tr></thead><tbody>';

  doctors.forEach(function(doc){
    h+='<tr><td class="fix-left-body" style="font-size:11px;font-weight:700;padding:2px 6px;white-space:nowrap;border-right:2px solid #bbb;">'+doc.n+'</td>';
    for(var d=1;d<=days;d++){
      var dateStr=ds(curY,curM,d);
      var w=new Date(curY,curM,d).getDay();
      var isH=HOL.has(dateStr);
      var sh=(shifts[dateStr]||[]).find(function(s){return s.docId===doc.id;});
      var bg='',txt='',col='';
      if(sh){
        var isKibo=sh.clinicId==='yasumi'&&sh.memo==='希望';
        if(isKibo){bg='#f3e5f5';col='#7b2d8b';txt='希望休';}
        else if(sh.clinicId==='yasumi'){bg='#eceff1';col='#78909c';txt='休み';}
        else if(sh.clinicId==='yukyu'){bg='#eceff1';col='#e53935';txt='有給';}
        else if(sh.clinicId==='daikyu'){bg='#eceff1';col='#1a5276';txt='代休';}
        else if(sh.clinicId==='daishutsu'){bg='#777';col='#fff';txt='代出';}
        else{var c=getCC(sh.clinicId);bg=c.c;col='#fff';txt=cname(sh.clinicId);}
      } else {
        var rowBg=w===0||isH?'#fff5f5':w===6?'#f0f5ff':'';
        bg=rowBg;col='#ccc';txt='';
      }
      var click=isAdmin?'onclick="cellClick(\''+dateStr+'\',\''+doc.id+'\')"':'';
      h+='<td class="shift-cell" style="background:'+bg+';color:'+col+';font-weight:700;font-size:10px;line-height:28px;" '+click+'>'+txt+'</td>';
    }
    h+='</tr>';
  });
  h+='</tbody>';
  document.getElementById('shiftTable').innerHTML=h;
  renderPaintBar();
}

function cellClick(dateStr,docId){
  if(!isAdmin)return;
  if(paintClinic){
    snapshot();
    if(!shifts[dateStr])shifts[dateStr]=[];
    var idx=shifts[dateStr].findIndex(function(s){return s.docId===docId;});
    /* 同じ医院なら削除（トグル） */
    var cid=paintClinic==='__kibokyu__'?'yasumi':paintClinic;
    var memo=paintClinic==='__kibokyu__'?'希望':'';
    if(idx>=0&&shifts[dateStr][idx].clinicId===cid){
      shifts[dateStr].splice(idx,1);
      if(!shifts[dateStr].length)delete shifts[dateStr];
      dbDel(dateStr,docId);
    } else {
      var entry={docId:docId,clinicId:cid,memo:memo};
      if(idx>=0)shifts[dateStr][idx]=entry;else shifts[dateStr].push(entry);
      dbSave(dateStr,docId,cid,memo);
    }
    renderShifts();
    return;
  }
  /* ペイント未選択: ポップアップで医院選択は不要。ペイントバーを表示 */
  document.getElementById('paintBar').style.display='flex';
  renderPaintBar();
}

function setPaint(cid){
  paintClinic=cid;
  if(!cid)document.getElementById('paintBar').style.display='none';
  renderPaintBar();renderShifts();
}
function renderPaintBar(){
  if(!isAdmin)return;
  var bar=document.getElementById('paintBar');
  if(!paintClinic){
    document.getElementById('paintLbl').textContent='↓ 医院を選んでセルをクリック';
  } else {
    var n=paintClinic==='__kibokyu__'?'希望休':cname(paintClinic);
    document.getElementById('paintLbl').textContent='「'+n+'」を塗る → セルをクリック';
  }
  var opts='';
  CLINICS.forEach(function(cl){
    var c=getCC(cl.id),on=paintClinic===cl.id;
    opts+='<button class="paint-opt" onclick="setPaint(\''+cl.id+'\')" style="background:'+(on?c.c:'rgba(255,255,255,.1)')+';color:'+(on?'#fff':c.c)+';border-color:'+(on?'#fff':'transparent')+';">'+cl.n+'</button>';
  });
  opts+='<span style="margin:0 4px;color:#555;">|</span>';
  STATUSES.forEach(function(s){
    var c=getCC(s.id),on=paintClinic===s.id;
    opts+='<button class="paint-opt" onclick="setPaint(\''+s.id+'\')" style="background:'+(on?c.c:'rgba(255,255,255,.1)')+';color:'+(on?'#fff':c.c)+';border-color:'+(on?'#fff':'transparent')+';">'+s.n+'</button>';
  });
  var kiboOn=paintClinic==='__kibokyu__';
  opts+='<button class="paint-opt" onclick="setPaint(\'__kibokyu__\')" style="background:'+(kiboOn?'#7b2d8b':'rgba(255,255,255,.1)')+';color:'+(kiboOn?'#fff':'#7b2d8b')+';border-color:'+(kiboOn?'#fff':'transparent')+';">希望休</button>';
  opts+='<button class="paint-opt" onclick="setPaintDel()" style="background:'+(paintClinic==='__del__'?'#b83030':'rgba(255,255,255,.1)')+';color:'+(paintClinic==='__del__'?'#fff':'#ff6b6b')+';border-color:'+(paintClinic==='__del__'?'#fff':'transparent')+';">削除</button>';
  document.getElementById('paintOpts').innerHTML=opts;
}
function setPaintDel(){paintClinic='__del__';renderPaintBar();renderShifts();}

/* ======= Tab 1: 休診日 ======= */
function renderClosed(){
  var days=dim(curY,curM);
  var DOW=['日','月','火','水','木','金','土'];
  var h='<thead><tr><th class="fix-left" style="z-index:12;min-width:54px;">日付</th>';
  CLINICS.forEach(function(c){
    var col=getCC(c.id);
    h+='<th style="padding:4px 6px;font-size:10px;font-weight:700;color:'+col.c+';min-width:44px;">'+c.n+'</th>';
  });
  h+='</tr></thead><tbody>';
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    var w=new Date(curY,curM,d).getDay();
    var isH=HOL.has(dateStr);
    var rowBg=isH?'#fff0f0':w===0?'#fff5f5':w===6?'#f0f5ff':'#fff';
    var numCol=w===0||isH?'#e05252':w===6?'#4a7fd4':'var(--ink,#333)';
    h+='<tr style="background:'+rowBg+'">';
    h+='<td class="fix-left-body" style="background:'+rowBg+';padding:4px 6px;font-weight:700;font-size:12px;color:'+numCol+';white-space:nowrap;border-right:2px solid #bbb;">'+
      d+'<span style="font-size:10px;margin-left:2px;">'+DOW[w]+'</span>'+
      (isH?'<span class="hol-badge">祝</span>':'')+'</td>';
    CLINICS.forEach(function(c){
      var closed=isClosed(dateStr,c.id);
      var col=getCC(c.id);
      var bg=closed?col.c:'transparent';
      var tx=closed?'#fff':'';
      var click=isAdmin?'onclick="toggleClosed(\''+dateStr+'\',\''+c.id+'\')"':'';
      h+='<td class="closed-cell" style="background:'+bg+';color:'+tx+';" '+click+'>'+(closed?'休':'')+'</td>';
    });
    h+='</tr>';
  }
  h+='</tbody>';
  document.getElementById('closedTable').innerHTML=h;
}
function toggleClosed(dateStr,cid){
  snapshot();
  if(!CLOSED_DATES[cid])CLOSED_DATES[cid]=[];
  var idx=CLOSED_DATES[cid].indexOf(dateStr);
  if(idx>=0){CLOSED_DATES[cid].splice(idx,1);}
  else if(isClosed(dateStr,cid)){
    if(!CLOSED_DATES[cid+'_open'])CLOSED_DATES[cid+'_open']=[];
    var oi=CLOSED_DATES[cid+'_open'].indexOf(dateStr);
    if(oi>=0)CLOSED_DATES[cid+'_open'].splice(oi,1);
    else CLOSED_DATES[cid+'_open'].push(dateStr);
  } else {CLOSED_DATES[cid].push(dateStr);}
  saveClosed();renderClosed();
}

/* ======= Tab 2: 集計 ======= */
function renderSummary(){
  var days=dim(curY,curM);
  var restIds=new Set(['yasumi','yukyu','daikyu']);
  /* ドクター別出勤数 */
  var h='<h3 style="font-size:14px;font-weight:700;margin-bottom:8px;">ドクター別出勤日数（'+(curM+1)+'月）</h3>';
  h+='<table class="sum-tbl"><thead><tr><th>ドクター</th><th>出勤</th><th>休み</th><th>有給</th><th>希望休</th></tr></thead><tbody>';
  doctors.forEach(function(doc){
    var work=0,off=0,yuk=0,kibo=0;
    for(var d=1;d<=days;d++){
      var dateStr=ds(curY,curM,d);
      var sh=(shifts[dateStr]||[]).find(function(s){return s.docId===doc.id;});
      if(sh){
        if(sh.clinicId==='yukyu')yuk++;
        else if(sh.clinicId==='yasumi'&&sh.memo==='希望')kibo++;
        else if(restIds.has(sh.clinicId))off++;
        else work++;
      }
    }
    h+='<tr><td style="font-weight:700;">'+doc.n+'</td><td style="font-weight:700;color:#2e7d32;">'+work+'</td><td>'+off+'</td><td style="color:#e53935;">'+yuk+'</td><td style="color:#7b2d8b;">'+kibo+'</td></tr>';
  });
  h+='</tbody></table>';
  /* 医院別人数 */
  h+='<h3 style="font-size:14px;font-weight:700;margin:20px 0 8px;">医院別配置人数（'+(curM+1)+'月）</h3>';
  h+='<table class="sum-tbl"><thead><tr><th>日付</th>';
  CLINICS.forEach(function(c){var col=getCC(c.id);h+='<th style="color:'+col.c+';">'+c.n+'</th>';});
  h+='</tr></thead><tbody>';
  for(var d=1;d<=days;d++){
    var dateStr=ds(curY,curM,d);
    var w=new Date(curY,curM,d).getDay();
    var DOW=['日','月','火','水','木','金','土'];
    var isH=HOL.has(dateStr);
    var numCol=w===0||isH?'#e05252':w===6?'#4a7fd4':'';
    h+='<tr><td style="font-weight:700;color:'+numCol+';">'+d+'('+DOW[w]+')'+(isH?'祝':'')+'</td>';
    CLINICS.forEach(function(c){
      var cnt=(shifts[dateStr]||[]).filter(function(s){return s.clinicId===c.id;}).length;
      var closed=isClosed(dateStr,c.id);
      var bg=closed?'#f0f0ee':cnt>0?getCC(c.id).b:'';
      h+='<td style="background:'+bg+';font-weight:'+(cnt?'700':'400')+';color:'+(closed?'#bbb':cnt?getCC(c.id).c:'#ccc')+';">'+(closed?'休':cnt||'')+'</td>';
    });
    h+='</tr>';
  }
  h+='</tbody></table>';
  document.getElementById('summaryView').innerHTML=h;
}

/* ======= 削除モード対応 ======= */
var origCellClick=cellClick;
cellClick=function(dateStr,docId){
  if(paintClinic==='__del__'){
    snapshot();
    if(shifts[dateStr]){
      shifts[dateStr]=shifts[dateStr].filter(function(s){return s.docId!==docId;});
      if(!shifts[dateStr].length)delete shifts[dateStr];
    }
    dbDel(dateStr,docId);
    renderShifts();
    return;
  }
  origCellClick(dateStr,docId);
};

updateMonthLbl();
loadData().then(function(){renderTab();});
window.addEventListener('beforeunload',function(){saveShifts();saveClosed();});
